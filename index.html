<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bestell App</title>

<style>
*{box-sizing:border-box;}

body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
  padding:10px;
}

h1{text-align:center;font-size:22px;}

#nameBtn{
  display:block;
  margin:0 auto 10px auto;
  background:#3b82f6;
  color:white;
  padding:10px;
  border-radius:10px;
  width:100%;
}

#status{
  text-align:center;
  font-weight:bold;
  margin:10px 0;
}

.main-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  margin-top:8px;
}

.start{background:#22c55e;color:white;}
.stop{background:#ef4444;color:white;}

.card{
  background:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
}

input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
}

input:disabled, select:disabled{
  background:#e5e7eb;
  color:#888;
}

.add{
  width:100%;
  background:#22c55e;
  color:white;
  padding:12px;
  border-radius:10px;
}

.wa{
  width:100%;
  background:#25D366;
  color:white;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
}

li{
  list-style:none;
  background:#fff;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
}

.item-top{
  display:flex;
  justify-content:space-between;
}

#clearBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ef4444;
  color:white;
  border-radius:50%;
  width:60px;
  height:60px;
}
</style>
</head>

<body>

<h1>🍽️ Bestell App</h1>

<button id="nameBtn" onclick="changeName()"></button>

<div class="card">
📍 Restaurant
<input id="restaurant" placeholder="z. B. Baron">

🕒 Wann
<input id="time" placeholder="z. B. 17:20 Uhr">

🚪 Tor
<select id="gate">
  <option value="Nord-Tor" selected>Nord-Tor</option>
  <option value="Haupt-Tor">Haupt-Tor</option>
</select>

<div id="status">🔴 Bestellung gestoppt</div>

<button id="startBtn" class="main-btn start" onclick="startOrder()">
Bestellung starten
</button>

</div>

<div class="card">
<input id="order" placeholder="Was willst du essen?">
<button class="add" onclick="addOrder()">+ Bestellung</button>
</div>

<ul id="list"></ul>

<button class="wa" onclick="shareWhatsApp()">📲 WhatsApp</button>

<button id="clearBtn" onclick="clearAll()">🧹</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

let userId = localStorage.getItem("userId") || Math.random();
localStorage.setItem("userId", userId);

let userName = localStorage.getItem("userName") || prompt("Wie heißt du?");
localStorage.setItem("userName", userName);

function updateNameButton(){
  document.getElementById("nameBtn").innerText =
    "Eingeloggt als: " + userName + " (ändern)";
}
updateNameButton();

window.changeName = function(){
  let n = prompt("Neuer Name:");
  if(!n) return;
  userName = n;
  localStorage.setItem("userName", n);
  updateNameButton();
}

// INPUTS
const restaurant = document.getElementById("restaurant");
const time = document.getElementById("time");
const gate = document.getElementById("gate");

restaurant.value = localStorage.getItem("restaurant")||"";
time.value = localStorage.getItem("time")||"";
gate.value = localStorage.getItem("gate")||"Nord-Tor";

restaurant.oninput=()=>localStorage.setItem("restaurant",restaurant.value);
time.oninput=()=>localStorage.setItem("time",time.value);
gate.onchange=()=>localStorage.setItem("gate",gate.value);

// FIREBASE
const app = initializeApp({
  apiKey:"AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
  databaseURL:"https://essen-bestelliste-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

// STATUS
onValue(ref(db,"status"), snap=>{
  let running = snap.val();

  let status = document.getElementById("status");
  let btn = document.getElementById("startBtn");

  if(running){
    status.innerText="🟢 Bestellung läuft...";
    btn.innerText="Bestellung stoppen";
    btn.className="main-btn stop";

    restaurant.disabled = true;
    time.disabled = true;
    gate.disabled = true;

  }else{
    status.innerText="🔴 Bestellung gestoppt";
    btn.innerText="Bestellung starten";
    btn.className="main-btn start";

    restaurant.disabled = false;
    time.disabled = false;
    gate.disabled = false;
  }
});

// 🔥 BESTELLUNGEN ANZEIGEN
onValue(ref(db,"orders"), snapshot=>{
  let list = document.getElementById("list");
  list.innerHTML="";

  if(!snapshot.exists()) return;

  snapshot.forEach(child=>{
    let data = child.val();

    let li = document.createElement("li");
    li.innerHTML = `
      <div class="item-top">
        <span>${data.user}: ${data.name}</span>
      </div>
    `;
    list.appendChild(li);
  });
});

// START/STOP
window.startOrder = function(){
  onValue(ref(db,"status"), snap=>{
    let running = snap.val();

    if(!running){
      set(ref(db,"status"), true);
    }else{
      let pw = prompt("Passwort:");
      if(pw==="stop"){
        set(ref(db,"status"), false);
      }
    }
  }, {onlyOnce:true});
}

// ADD
window.addOrder = function(){
  let val = document.getElementById("order").value;
  if(!val) return;

  push(ref(db,"orders"),{
    name:val,
    user:userName,
    owner:userId
  });

  document.getElementById("order").value="";
}

// WHATSAPP
window.shareWhatsApp = function(){
  let msg="🍽️ Bestellung\n\n";
  msg+="📍 "+restaurant.value+"\n";
  msg+="🕒 "+time.value+"\n";
  msg+="🚪 "+gate.value+"\n\n";

  document.querySelectorAll("#list li").forEach(li=>{
    msg += "- " + li.innerText + "\n";
  });

  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// CLEAR
window.clearAll = function(){
  let pw = prompt("Passwort:");
  if(pw!=="clear") return;
  remove(ref(db,"orders"));
}
</script>

</body>
</html>
