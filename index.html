<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bestell App</title>

<style>
*{box-sizing:border-box;}

body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
  padding:10px;
}

h1{
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
}

#nameBtn{
  display:block;
  margin:0 auto 10px auto;
  background:#3b82f6;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  font-weight:bold;
}

.card{
  background:white;
  padding:14px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:16px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.add{width:100%;background:#22c55e;color:white;}
.wa{width:100%;background:#25D366;color:white;margin-top:10px;}

li{
  list-style:none;
  background:#fff;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
}

.item-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.edit-btn{
  background:#3b82f6;
  color:white;
  border-radius:50%;
  width:32px;
  height:32px;
}

.controls{
  display:none;
  gap:5px;
  margin-top:8px;
}

.controls.active{display:flex;}
.controls button{flex:1;}

.plus{background:#22c55e;color:white;}
.minus{background:#f59e0b;color:white;}
.delete{background:#ef4444;color:white;}

.edit-input{
  width:100%;
  padding:8px;
  margin-top:8px;
}

#footer{text-align:center;margin-top:15px;}
#footer img{width:60px;height:60px;border-radius:50%;}

#clearBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ef4444;
  color:white;
  border-radius:50%;
  width:60px;
  height:60px;
  font-size:22px;
}
</style>
</head>

<body>

<h1>🍽️ Bestell App</h1>

<button id="nameBtn" onclick="changeName()">👤 Name ändern</button>

<div class="card">
📍 Restaurant
<input id="restaurant" placeholder="z. B. Baron">

🕒 Wann
<input id="time" placeholder="z. B. 17:20 Uhr">

🚪 Tor
<select id="gate">
  <option value="Nord-Tor" selected>Nord-Tor</option>
  <option value="Haupt-Tor">Haupt-Tor</option>
</select>
</div>

<div class="card">
<input id="order" placeholder="Was willst du essen?">
<button class="add" onclick="addOrder()">+ Bestellung</button>
</div>

<ul id="list"></ul>

<button class="wa" onclick="shareWhatsApp()">📲 WhatsApp</button>

<div id="footer">
<img src="logo.png">
</div>

<button id="clearBtn" onclick="clearAll()">🧹</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

let userId = localStorage.getItem("userId");
if(!userId){
  userId = Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

let userName = localStorage.getItem("userName");

if(!userName){
  userName = prompt("Wie heißt du?");
  if(!userName) userName = "Unbekannt";
  localStorage.setItem("userName", userName);
}

function updateNameButton(){
  document.getElementById("nameBtn").innerText = "👤 " + userName + " ändern";
}
updateNameButton();

window.changeName = async function(){
  let newName = prompt("Neuer Name:");
  if(!newName) return;

  userName = newName;
  localStorage.setItem("userName", userName);
  updateNameButton();

  // 🔥 ALLE EIGENEN BESTELLUNGEN UPDATEN
  const snapshot = await get(ref(db,"orders"));

  if(snapshot.exists()){
    snapshot.forEach(child=>{
      let data = child.val();

      if(data.owner === userId){
        update(ref(db,"orders/"+child.key),{
          user:userName
        });
      }
    });
  }

  alert("Name aktualisiert!");
}

const restaurantInput = document.getElementById("restaurant");
const timeInput = document.getElementById("time");
const gateInput = document.getElementById("gate");

restaurantInput.value = localStorage.getItem("restaurant") || "";
timeInput.value = localStorage.getItem("time") || "";
gateInput.value = localStorage.getItem("gate") || "Nord-Tor";

restaurantInput.oninput = () => localStorage.setItem("restaurant", restaurantInput.value);
timeInput.oninput = () => localStorage.setItem("time", timeInput.value);
gateInput.onchange = () => localStorage.setItem("gate", gateInput.value);

const app = initializeApp({
  apiKey:"AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
  databaseURL:"https://essen-bestelliste-default-rtdb.firebaseio.com"
});

const db = getDatabase(app);
const list = document.getElementById("list");

onValue(ref(db,"orders"), snapshot=>{
  list.innerHTML="";
  if(!snapshot.exists()) return;

  snapshot.forEach(child=>{
    let data = child.val();

    let li = document.createElement("li");

    li.innerHTML = `
      <div class="item-top">
        <span>${data.user}: ${data.name} x${data.qty}</span>
        ${data.owner===userId ? `<button class="edit-btn" onclick="toggleEdit('${child.key}')">✏️</button>` : ""}
      </div>

      <input id="edit-${child.key}" class="edit-input" value="${data.name}" style="display:none">

      <div id="controls-${child.key}" class="controls">
        <button class="plus" onclick="changeQty('${child.key}', ${data.qty+1})">+</button>
        <button class="minus" onclick="changeQty('${child.key}', ${data.qty-1})">-</button>
        <button class="delete" onclick="deleteOrder('${child.key}')">🗑</button>
        <button onclick="saveEdit('${child.key}')">💾</button>
      </div>
    `;

    list.appendChild(li);
  });
});

window.addOrder = function(){
  let input=document.getElementById("order");
  if(input.value==="") return;

  push(ref(db,"orders"),{
    name:input.value,
    qty:1,
    owner:userId,
    user:userName
  });

  input.value="";
}

window.changeQty = function(id, qty){
  if(qty<=0){
    remove(ref(db,"orders/"+id));
  } else {
    update(ref(db,"orders/"+id), { qty: qty });
  }
}

window.deleteOrder = function(id){
  if(confirm("Löschen?")){
    remove(ref(db,"orders/"+id));
  }
}

window.toggleEdit = function(id){
  let controls = document.getElementById("controls-"+id);
  let input = document.getElementById("edit-"+id);

  controls.classList.toggle("active");
  input.style.display = input.style.display === "none" ? "block" : "none";
}

window.saveEdit = function(id){
  let value = document.getElementById("edit-"+id).value;
  update(ref(db,"orders/"+id),{ name:value });
}

window.shareWhatsApp = function(){
  let msg="🍽️ Bestellung\n\n";
  msg+="📍 "+restaurantInput.value+"\n";
  msg+="🕒 "+timeInput.value+"\n";
  msg+="🚪 "+gateInput.value+"\n\n";

  document.querySelectorAll(".item-top span").forEach(el=>{
    msg += "- " + el.innerText + "\n";
  });

  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

window.clearAll = function(){
  let pw = prompt("Passwort:");
  if(pw!=="clear") return;

  remove(ref(db,"orders"));

  restaurantInput.value="";
  timeInput.value="";
  gateInput.value="Nord-Tor";

  localStorage.clear();
}
</script>

</body>
</html>
