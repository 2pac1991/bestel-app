<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestell-Liste</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* HEADER MIT PROFIL-BUTTON */
        .app-header {
            width: 100%;
            background: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 1100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 20px; font-weight: 800; margin: 0; }

        #profileBtn {
            background: #f1f5f9;
            border: 1.5px solid #e2e8f0;
            padding: 8px 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        #timerDisplay {
            background: #fee2e2; color: #dc2626; padding: 14px; border-radius: 18px;
            font-weight: 800; text-align: center; margin-bottom: 15px;
            display: none; border: 1.5px solid #fecaca;
        }

        .card {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }

        input, select {
            width: 100%; padding: 12px; margin: 4px 0 15px 0; border-radius: 12px;
            border: 1.5px solid #f1f5f9; background: #f8fafc; font-size: 16px;
        }

        .btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer;
        }

        #startBtn { color: white; background: var(--primary); }
        .add-btn { background: var(--success); color: white; }

        ul { padding: 0; list-style: none; width: 100%; }
        li {
            background: white; padding: 18px; border-radius: 18px; margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .user-label { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; display: block; margin-bottom: 2px; }
        .food-name { font-weight: 700; font-size: 19px; color: var(--text-main); }

        .edit-btn { background: #f1f5f9; color: var(--text-muted); border: none; padding: 6px 10px; border-radius: 8px; font-size: 12px; margin-top: 8px; cursor: pointer; }

        .controls { display: none; margin-top: 10px; flex-direction: column; gap: 5px; }
        .controls.active { display: flex; }

        #timeModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 2000; width: 85%; max-width: 320px; text-align: center;
        }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); z-index: 1999; }

        .wa-sticky { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(0deg, #f8fafc 50%, transparent); display: none; justify-content: center; z-index: 1000; }
        .wa-btn { background: var(--whatsapp); color: white; border: none; border-radius: 15px; font-weight: 700; padding: 16px; width: 100%; max-width: 460px; cursor: pointer; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3); }

        #clearBtn { position: fixed; bottom: 100px; right: 20px; background: white; border: none; width: 45px; height: 45px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; z-index: 999; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="header-logo">
            <h1>Bestell-Liste</h1>
        </div>
        <button id="profileBtn">
            <span>👤</span>
            <span id="userNameDisplay">Lädt...</span>
        </button>
    </header>

    <div class="container">
        <div id="timerDisplay">⌛ Ende der Bestellung: <span id="endTimeText">--:--</span></div>

        <div class="card">
            <span class="label">📍 Restaurant</span>
            <input id="restaurant" placeholder="Name des Ladens">
            
            <span class="label">🕒 Lieferung um</span>
            <input id="time" placeholder="z. B. 12:30 Uhr">
            
            <span class="label">📦 Kammerl</span>
            <select id="chamber">
                <option>Spinnereikammerl</option>
                <option>NB-Kammerl</option>
            </select>

            <span class="label">🚪 Tor</span>
            <select id="gate">
                <option>Nord-Tor</option>
                <option>Haupt-Tor</option>
            </select>
            
            <button id="startBtn" class="btn">Laden...</button>
        </div>

        <div id="orderCard" class="card" style="display:none; border: 2px solid #bbf7d0; background: #f0fdf4;">
            <span class="label">Deine Bestellung</span>
            <input id="order" placeholder="Was isst du?">
            <button id="addOrderBtn" class="btn add-btn">Hinzufügen</button>
        </div>

        <ul id="list"></ul>
    </div>

    <div id="modalOverlay"></div>
    <div id="timeModal">
        <span class="label">Einsendeschluss festlegen</span>
        <input type="time" id="deadlineInput" value="11:30">
        <button id="confirmStartBtn" class="btn" style="background: var(--primary); color: white;">Starten</button>
        <button id="cancelModalBtn" class="btn" style="background: #f1f5f9; color: #64748b; margin-top: 8px; font-size: 14px;">Abbrechen</button>
    </div>

    <div id="waLeiste" class="wa-sticky">
        <button id="shareWaBtn" class="wa-btn">Liste auf WhatsApp teilen</button>
    </div>

    <button id="clearBtn">🧹</button>

<script type="module">
