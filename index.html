<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        h1 {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        /* User Button */
        #nameBtn {
            width: 100%;
            background: var(--card-bg);
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 12px;
            border-radius: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }
        #nameBtn:hover { background: #eff6ff; }

        /* Cards */
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .label {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0 18px 0;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
            background: #fcfcfd;
            font-size: 16px;
            color: var(--text-main);
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        #startBtn { color: white; }
        .add-btn { background: var(--success); color: white; margin-top: 10px; }
        .wa-btn { background: #25D366; color: white; margin-top: 10px; text-decoration: none; }
        
        .add-btn:active, .wa-btn:active { transform: scale(0.98); }

        /* List Items */
        ul { padding: 0; margin: 0; }
        li {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            list-style: none;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }

        .item-top { display: flex; justify-content: space-between; align-items: center; }
        .item-info { display: flex; flex-direction: column; }
        .user-label { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
        .food-name { font-weight: 700; font-size: 17px; }

        .edit-btn {
            background: #f1f5f9;
            color: var(--text-muted);
            border-radius: 10px;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
        }

        /* Controls */
        .controls { display: none; margin-top: 15px; gap: 8px; flex-wrap: wrap; }
        .controls.active { display: flex; }
        
        .control-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
        .qty-plus { background: var(--success); }
        .qty-minus { background: var(--warning); }
        .qty-del { background: var(--danger); }
        .save-btn { background: var(--primary); width: 100%; margin-top: 5px; }

        /* Utilities */
        #orderCard { display: none; border: 2px solid var(--success); }
        input:disabled, select:disabled { background: #f1f5f9; cursor: not-allowed; }

        #clearBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--card-bg);
            color: var(--danger);
            border: 1px solid #fee2e2;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        #footer img { width: 50px; opacity: 0.8; margin-top: 30px; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="container">
    <h1>🍽️ FoodOrder <span style="color: var(--primary);">Pro</span></h1>

    <button id="nameBtn" onclick="changeName()">Lädt...</button>

    <div class="card">
        <span class="label">📍 Restaurant</span>
        <input id="restaurant" placeholder="z. B. Pizzeria Bella">

        <span class="label">🕒 Zeitplan</span>
        <input id="time" placeholder="z. B. 18:30 Uhr">

        <span class="label">🚪 Übergabeort</span>
        <select id="gate">
            <option selected>Nord-Tor</option>
            <option>Haupt-Tor</option>
            <option>Haupteingang</option>
        </select>

        <button id="startBtn" class="btn" onclick="toggleOrder()">Wird initialisiert...</button>
    </div>

    <div class="card" id="orderCard">
        <span class="label">Deine Bestellung</span>
        <input id="order" placeholder="Was möchtest du essen?">
        <button class="btn add-btn" onclick="addOrder()">Hinzufügen</button>
    </div>

    <ul id="list"></ul>

    <button class="btn wa-btn" onclick="shareWhatsApp()">
        <svg style="width:20px; height:20px; fill:currentColor;" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp Liste teilen
    </button>

    <div id="footer" style="text-align: center;">
        <img src="logo.png" alt="Logo">
    </div>

    <button id="clearBtn" title="Liste leeren" onclick="clearAll()">🧹</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
        databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // User State
    let userId = localStorage.getItem("userId") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
    let userName = localStorage.getItem("userName") || prompt("Wie heißt du?");
    localStorage.setItem("userName", userName || "Unbekannt");

    function updateNameButton() {
        document.getElementById("nameBtn").innerText = `👤 ${userName} (Name ändern)`;
    }
    updateNameButton();

    window.changeName = () => {
        let n = prompt("Neuer Name:", userName);
        if(n) { userName = n; localStorage.setItem("userName", n); updateNameButton(); }
    };

    // Persistence
    const fields = ['restaurant', 'time', 'gate'];
    fields.forEach(id => {
        const el = document.getElementById(id);
        el.value = localStorage.getItem(id) || (id === 'gate' ? 'Nord-Tor' : '');
        el.oninput = () => localStorage.setItem(id, el.value);
    });

    // Order Toggle Logic
    let orderActive = localStorage.getItem("orderActive") === "true";
    function updateUI() {
        const startBtn = document.getElementById("startBtn");
        const orderCard = document.getElementById("orderCard");
        
        if(orderActive) {
            startBtn.innerText = "🛑 Bestellung stoppen";
            startBtn.style.background = "var(--danger)";
            orderCard.style.display = "block";
            fields.forEach(id => document.getElementById(id).disabled = true);
        } else {
            startBtn.innerText = "🟢 Bestellung starten";
            startBtn.style.background = "var(--primary)";
            orderCard.style.display = "none";
            fields.forEach(id => document.getElementById(id).disabled = false);
        }
    }
    updateUI();

    window.toggleOrder = () => {
        if(orderActive) {
            if(prompt("Passwort zum Stoppen:") !== "stop") return;
            orderActive = false;
        } else {
            orderActive = true;
        }
        localStorage.setItem("orderActive", orderActive);
        updateUI();
    };

    // Realtime List
    onValue(ref(db, "orders"), snap => {
        const list = document.getElementById("list");
        list.innerHTML = "";
        if(!snap.exists()) return;

        snap.forEach(child => {
            const d = child.val();
            const li = document.createElement("li");
            const isOwner = d.owner === userId;

            li.innerHTML = `
                <div class="item-top">
                    <div class="item-info">
                        <span class="user-label">${d.user}</span>
                        <span class="food-name" data-food="${d.name}" data-qty="${d.qty}">${d.name} <span style="color: var(--primary)">x${d.qty || 1}</span></span>
                    </div>
                    ${isOwner ? `<button class="edit-btn" onclick="toggleEdit('${child.key}')">Optionen</button>` : ""}
                </div>
                <div id="c-${child.key}" class="controls">
                    <input id="edit-${child.key}" style="margin-bottom:10px" value="${d.name}">
                    <div style="display: flex; gap: 8px; width:100%">
                        <button class="control-btn qty-plus" onclick="changeQty('${child.key}',1)">+</button>
                        <button class="control-btn qty-minus" onclick="changeQty('${child.key}',-1)">-</button>
                        <button class="control-btn qty-del" onclick="deleteOrder('${child.key}')">Löschen</button>
                    </div>
                    <button class="control-btn save-btn" onclick="saveEdit('${child.key}')">Speichern</button>
                </div>
            `;
            list.appendChild(li);
        });
    });

    // CRUD Ops
    window.addOrder = async () => {
        const input = document.getElementById("order");
        const val = input.value.trim();
        if(!val) return;

        const snap = await get(ref(db, "orders"));
        let foundKey = null, foundQty = 0;
        
        if(snap.exists()) {
            snap.forEach(c => {
                if(c.val().owner === userId && c.val().name.toLowerCase() === val.toLowerCase()) {
                    foundKey = c.key; foundQty = c.val().qty || 1;
                }
            });
        }

        if(foundKey) update(ref(db, `orders/${foundKey}`), { qty: foundQty + 1 });
        else push(ref(db, "orders"), { name: val, user: userName, owner: userId, qty: 1 });
        input.value = "";
    };

    window.toggleEdit = id => document.getElementById(`c-${id}`).classList.toggle("active");

    window.saveEdit = id => {
        const val = document.getElementById(`edit-${id}`).value;
        update(ref(db, `orders/${id}`), { name: val });
        window.toggleEdit(id);
    };

    window.changeQty = (id, delta) => {
        const r = ref(db, `orders/${id}`);
        get(r).then(s => {
            const n = (s.val().qty || 1) + delta;
            n <= 0 ? remove(r) : update(r, { qty: n });
        });
    };

    window.deleteOrder = id => confirm("Eintrag entfernen?") && remove(ref(db, `orders/${id}`));

    window.shareWhatsApp = () => {
        let m = `*🍽️ BESTELLUNG: ${document.getElementById("restaurant").value || 'Unbekannt'}*\n`;
        m += `🕒 Zeit: ${document.getElementById("time").value || '-'}\n`;
        m += `🚪 Ort: ${document.getElementById("gate").value}\n`;
        m += `––––––––––––––––––\n`;
        
        const items = document.querySelectorAll(".food-name");
        items.forEach(i => m += `• ${i.getAttribute("data-food")} (x${i.getAttribute("data-qty")})\n`);
        
        if(items.length === 0) m += "_Keine Einträge_";
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
    };

    window.clearAll = () => prompt("Admin Passwort:") === "clear" && remove(ref(db, "orders"));
</script>

</body>
</html>
