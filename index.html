<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bestell App D-Schicht</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:10px;}
h1{text-align:center;font-size:22px;margin-bottom:15px;}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.add{width:100%;background:#22c55e;color:white;}
.wa{width:100%;background:#25D366;color:white;margin-top:10px;}

li{
  list-style:none;
  background:#fff;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
}

.item-top{
  display:flex;
  justify-content:space-between;
  font-weight:bold;
}

.controls{
  display:flex;
  gap:5px;
  margin-top:8px;
}

.controls button{flex:1;font-size:18px;}

.plus{background:#22c55e;color:white;}
.minus{background:#f59e0b;color:white;}
.delete{background:#ef4444;color:white;}

#footer{text-align:center;margin-top:15px;}
#footer img{width:60px;height:60px;border-radius:50%;}

/* 🧹 Button */
#clearBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ef4444;
  color:white;
  border:none;
  border-radius:50%;
  width:60px;
  height:60px;
  font-size:22px;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<h1>🍽️ Bestell App D-Schicht</h1>

<div class="card">
📍 Restaurant
<input id="restaurant" placeholder="Baron">

🕒 Wann
<input id="time" placeholder="17:20 Uhr">
</div>

<div class="card">
<input id="order" placeholder="Was willst du essen?">
<button class="add" onclick="addOrder()">+ Bestellung hinzufügen</button>
</div>

<div class="card">
<h3>🧾 Bestellungen</h3>
<ul id="list"></ul>
</div>

<button class="wa" onclick="shareWhatsApp()">📲 WhatsApp teilen</button>

<div id="footer">
  <img src="logo.png">
</div>

<button id="clearBtn" onclick="clearAll()">🧹</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

// 🔑 USER ID
let userId = localStorage.getItem("userId");
if(!userId){
  userId = Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

const firebaseConfig = {
  apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
  authDomain: "essen-bestelliste.firebaseapp.com",
  databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com",
  projectId: "essen-bestelliste"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const list = document.getElementById("list");

// 🔥 LIVE + ZUSAMMENFASSEN
onValue(ref(db,"orders"), snapshot=>{
  list.innerHTML="";
  if(!snapshot.exists()) return;

  let combined = {};

  snapshot.forEach(child=>{
    let data = child.val();

    if(!combined[data.name]){
      combined[data.name] = { qty:0, items:[] };
    }

    combined[data.name].qty += data.qty;
    combined[data.name].items.push({
      id: child.key,
      owner: data.owner,
      qty: data.qty
    });
  });

  Object.keys(combined).forEach(name=>{
    let entry = combined[name];

    let li = document.createElement("li");

    li.innerHTML = `
      <div class="item-top">
        <span>${name}</span>
        <span>x${entry.qty}</span>
      </div>
    `;

    entry.items.forEach(item=>{
      if(item.owner === userId){
        let controls = document.createElement("div");
        controls.className="controls";

        controls.innerHTML = `
          <button class="plus" onclick="changeQty('${item.id}', ${item.qty+1})">+</button>
          <button class="minus" onclick="changeQty('${item.id}', ${item.qty-1})">-</button>
          <button class="delete" onclick="deleteOrder('${item.id}')">🗑</button>
        `;

        li.appendChild(controls);
      }
    });

    list.appendChild(li);
  });
});

// ➕ ADD
window.addOrder = function(){
  let input=document.getElementById("order");
  let value=input.value.trim();
  if(value==="") return;

  push(ref(db,"orders"),{
    name:value,
    qty:1,
    owner:userId
  });

  input.value="";
}

// QTY
window.changeQty = function(id, qty){
  if(qty<=0){
    remove(ref(db,"orders/"+id));
  } else {
    update(ref(db,"orders/"+id), { qty: qty });
  }
}

// DELETE
window.deleteOrder = function(id){
  if(confirm("Löschen?")){
    remove(ref(db,"orders/"+id));
  }
}

// 📲 WHATSAPP
window.shareWhatsApp = function(){
  let restaurant=document.getElementById("restaurant").value;
  let time=document.getElementById("time").value;

  let msg="🍽️ Bestellung\n\n";
  msg+="📍 Restaurant: "+restaurant+"\n";
  msg+="🕒 Wann: "+time+"\n\n";

  document.querySelectorAll(".item-top").forEach(el=>{
    msg += "- " + el.innerText + "\n";
  });

  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// 🧹 CLEAR ALL
window.clearAll = function(){

  let pw = prompt("Passwort eingeben:");

  if(pw !== "clear"){
    alert("Falsches Passwort!");
    return;
  }

  if(!confirm("Wirklich alles löschen?")){
    return;
  }

  remove(ref(db,"orders"));

  document.getElementById("restaurant").value="";
  document.getElementById("time").value="";

  alert("Alles gelöscht!");
}
</script>

</body>
</html>
