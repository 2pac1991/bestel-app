<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Essen-Bestellliste</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            color: #1c1e21;
            margin-top: 0;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-start {
            background-color: #007bff;
            color: white;
        }

        .btn-add {
            background-color: #28a745;
            color: white;
        }

        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            margin-top: 20px;
        }

        /* Die Bestell-Bubbles aus deinem ersten Entwurf */
        .order-bubble {
            background-color: #e7f3ff;
            border-radius: 20px;
            padding: 10px 15px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #cce5ff;
        }

        .order-info {
            display: flex;
            flex-direction: column;
        }

        .order-user {
            font-size: 12px;
            color: #555;
            font-weight: bold;
        }

        .order-text {
            font-size: 16px;
            color: #000;
        }

        .edit-btn {
            background: #fff;
            border: 1px solid #007bff;
            color: #007bff;
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 12px;
            width: auto;
        }

        .edit-mode-box {
            width: 100%;
        }

        #status-info {
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
            color: #007bff;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        #time-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 15px;
            z-index: 1001;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍕 Bestellliste</h1>

    <div id="setup-card" class="card">
        <input id="restaurant" placeholder="Restaurant Name">
        <input id="delivery-time" placeholder="Lieferzeit (z.B. 12:30)">
        <select id="gate-select">
            <option>Nord-Tor</option>
            <option>Haupt-Tor</option>
        </select>
        <button class="btn-start" id="start-btn">Bestellrunde starten</button>
    </div>

    <div id="active-info" class="card" style="display:none;">
        <div id="status-info">Lädt...</div>
        <input id="order-input" placeholder="Was bestellst du?">
        <button class="btn-add" id="add-btn">Hinzufügen</button>
    </div>

    <div id="order-list-container" class="card" style="display:none;">
        <div id="order-items"></div>
        <button class="btn-whatsapp" id="wa-btn">Liste per WhatsApp senden</button>
    </div>
</div>

<div id="modal-overlay"></div>
<div id="time-modal">
    <h3>Bestellschluss?</h3>
    <input type="time" id="deadline-input" value="11:00">
    <button class="btn-start" id="confirm-start">Starten</button>
    <button style="background:none; color:gray; margin-top:10px;" id="cancel-modal">Abbrechen</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs", databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let userId = localStorage.getItem("userId") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
    let userName = localStorage.getItem("userName") || prompt("Dein Name?") || "Gast";
    localStorage.setItem("userName", userName);

    let currentEditingKey = null;
    let lastSnap = null;

    // RENDERN DER BUBBLES
    function renderOrders(snap) {
        const container = document.getElementById("order-items");
        container.innerHTML = "";
        
        if (!snap || !snap.exists()) {
            document.getElementById("order-list-container").style.display = "none";
            return;
        }
        document.getElementById("order-list-container").style.display = "block";

        snap.forEach(child => {
            const data = child.val();
            const key = child.key;

            const bubble = document.createElement("div");
            bubble.className = "order-bubble";

            if (currentEditingKey === key) {
                // Edit-Modus innerhalb der Bubble
                bubble.innerHTML = `
                    <div class="edit-mode-box">
                        <input id="edit-input-${key}" value="${data.name}">
                        <div style="display:flex; gap:5px;">
                            <button class="btn-add" style="padding:5px;" onclick="window.saveEdit('${key}')">Sichern</button>
                            <button style="background:#dc3545; color:white; padding:5px;" onclick="window.deleteItem('${key}')">Löschen</button>
                        </div>
                    </div>`;
            } else {
                bubble.innerHTML = `
                    <div class="order-info">
                        <span class="order-user">${data.user}</span>
                        <span class="order-text">${data.name}</span>
                    </div>
                    ${data.owner === userId ? `<button class="edit-btn" onclick="window.startEdit('${key}')">Ändern</button>` : ""}
                `;
            }
            container.appendChild(bubble);
        });
    }

    onValue(ref(db, "orders"), snap => {
        lastSnap = snap;
        renderOrders(snap);
    });

    onValue(ref(db, "settings"), snap => {
        const s = snap.val() || {};
        const active = s.orderActive && new Date().getTime() < s.endTime;
        
        document.getElementById("setup-card").style.display = active ? "none" : "block";
        document.getElementById("active-info").style.display = active ? "block" : "none";
        
        if (active) {
            const time = new Date(s.endTime);
            document.getElementById("status-info").innerText = `${s.restaurant} (bis ${time.getHours()}:${time.getMinutes().toString().padStart(2,'0')} Uhr)`;
        }
    });

    // START FUNKTIONEN
    document.getElementById("start-btn").onclick = () => {
        document.getElementById("modal-overlay").style.display = "block";
        document.getElementById("time-modal").style.display = "block";
    };

    document.getElementById("confirm-start").onclick = () => {
        const [h, m] = document.getElementById("deadline-input").value.split(":");
        const end = new Date(); end.setHours(h, m, 0, 0);
        
        remove(ref(db, "orders"));
        update(ref(db, "settings"), {
            orderActive: true,
            endTime: end.getTime(),
            restaurant: document.getElementById("restaurant").value || "Restaurant",
            time: document.getElementById("delivery-time").value,
            gate: document.getElementById("gate-select").value
        });
        
        document.getElementById("modal-overlay").style.display = "none";
        document.getElementById("time-modal").style.display = "none";
    };

    document.getElementById("add-btn").onclick = () => {
        const inp = document.getElementById("order-input");
        if (!inp.value) return;
        push(ref(db, "orders"), { name: inp.value, user: userName, owner: userId });
        inp.value = "";
    };

    // EDIT FUNKTIONEN (Global für onclick)
    window.startEdit = (key) => {
        currentEditingKey = key;
        renderOrders(lastSnap);
    };

    window.saveEdit = (key) => {
        const val = document.getElementById(`edit-input-${key}`).value;
        update(ref(db, `orders/${key}`), { name: val }).then(() => {
            currentEditingKey = null;
            renderOrders(lastSnap);
        });
    };

    window.deleteItem = (key) => {
        remove(ref(db, `orders/${key}`)).then(() => {
            currentEditingKey = null;
            renderOrders(lastSnap);
        });
    };

    // WHATSAPP (Zusammenfassung x2, x3 und Tor)
    document.getElementById("wa-btn").onclick = async () => {
        const sSnap = await get(ref(db, "settings"));
        const s = sSnap.val() || {};
        const oSnap = await get(ref(db, "orders"));
        
        let msg = `*Bestellung: ${s.restaurant}*\n🕒 Zeit: ${s.time}\n🚪 Tor: ${s.gate}\n----------\n`;
        
        const counts = {};
        oSnap.forEach(c => {
            const name = c.val().name.trim();
            counts[name] = (counts[name] || 0) + 1;
        });

        for (const [dish, qty] of Object.entries(counts)) {
            msg += `• ${qty > 1 ? qty + 'x ' : ''}${dish}\n`;
        }

        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    };

    document.getElementById("cancel-modal").onclick = () => {
        document.getElementById("modal-overlay").style.display = "none";
        document.getElementById("time-modal").style.display = "none";
    };
</script>

</body>
</html>
