<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs", databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const changeName = () => {
        let newName = prompt("Wie heißt du?", localStorage.getItem("userName"));
        if(newName && newName.trim()) {
            localStorage.setItem("userName", newName.trim());
            document.getElementById("userNameDisplay").innerText = newName.trim();
            userName = newName.trim();
        }
    };
    document.getElementById("profileBtn").onclick = changeName;

    let userId = localStorage.getItem("userId") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
    let userName = localStorage.getItem("userName") || prompt("Wie heißt du?") || "Gast";
    localStorage.setItem("userName", userName);
    document.getElementById("userNameDisplay").innerText = userName;

    let currentlyEditing = null;
    let isGlobalActive = false;
    let currentAdminId = null;

    const closeModal = () => {
        document.getElementById("modalOverlay").style.display = "none";
        document.getElementById("timeModal").style.display = "none";
    };

    onValue(ref(db, "settings"), snap => {
        const d = snap.val() || {};
        const now = new Date().getTime();
        isGlobalActive = d.orderActive && now < d.endTime;
        currentAdminId = d.adminId;

        document.getElementById("setupCard").style.display = isGlobalActive ? "none" : "block";
        document.getElementById("statusDisplay").style.display = isGlobalActive ? "block" : "none";
        document.getElementById("orderCard").style.display = isGlobalActive ? "block" : "none";
        document.getElementById("clearAllBtn").style.display = isGlobalActive ? "none" : "block";
        
        const statusEl = document.getElementById("orderBoxStatus");
        const detailsEl = document.getElementById("orderBoxDetails");

        if(isGlobalActive) {
            const date = new Date(d.endTime);
            document.getElementById("disp-deadline").innerText = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0') + " Uhr";
            document.getElementById("disp-res").innerText = d.restaurant || "---";
            document.getElementById("disp-time").innerText = (d.time || "---") + " Uhr";
            document.getElementById("disp-cham").innerText = d.chamber || "---";
            statusEl.style.display = "none";
        } else if (d.restaurant) {
            statusEl.style.display = "block";
            detailsEl.innerHTML = `${d.restaurant} | ${d.time} Uhr | ${d.chamber}`;
        }
    });

    document.getElementById("editResArea").onclick = () => {
        if(userId !== currentAdminId) return;
        const current = document.getElementById("disp-res").innerText;
        const newVal = prompt("Restaurant ändern:", current);
        if(newVal && newVal.trim() !== current) update(ref(db, "settings"), { restaurant: newVal.trim() });
    };

    document.getElementById("editTimeArea").onclick = () => {
        if(userId !== currentAdminId) return;
        const current = document.getElementById("disp-time").innerText.replace(" Uhr", "");
        const newVal = prompt("Lieferzeit ändern (z.B. 12:30):", current);
        if(newVal && newVal.trim() !== current) update(ref(db, "settings"), { time: newVal.trim() });
    };

    document.getElementById("editDeadlineArea").onclick = () => {
        if(userId !== currentAdminId) return;
        const newVal = prompt("Neuen Bestellschluss setzen (z.B. 11:00):");
        if(newVal) {
            const [h, m] = newVal.split(":").map(Number);
            const end = new Date(); end.setHours(h, m, 0, 0);
            if (end < new Date()) end.setDate(end.getDate() + 1);
            update(ref(db, "settings"), { endTime: end.getTime() });
        }
    };

    document.getElementById("startBtn").onclick = () => {
        document.getElementById("modalOverlay").style.display = "block";
        document.getElementById("timeModal").style.display = "block";
    };

    document.getElementById("cancelModalBtn").onclick = closeModal;
    document.getElementById("modalOverlay").onclick = closeModal;

    document.getElementById("confirmStartBtn").onclick = () => {
        const t = document.getElementById("deadlineInput").value;
        const [h, m] = t.split(":").map(Number);
        const end = new Date(); end.setHours(h, m, 0, 0);
        if (end < new Date()) end.setDate(end.getDate() + 1);
        remove(ref(db, "orders")).then(() => {
            update(ref(db, "settings"), { 
                orderActive: true, 
                endTime: end.getTime(), 
                restaurant: document.getElementById("restaurant").value, 
                time: document.getElementById("time").value, 
                chamber: document.getElementById("chamber").value, 
                gate: document.getElementById("gate").value,
                adminId: userId 
            });
        });
        closeModal();
    };

    document.getElementById("stopActionBtn").onclick = () => { 
        if(userId === currentAdminId || prompt("Admin Passwort:") === "admin") {
            if(confirm("Bestellung wirklich beenden?")) {
                update(ref(db, "settings"), { orderActive: false, endTime: 0 });
            }
        }
    };
    
    document.getElementById("clearAllBtn").onclick = () => {
        if(prompt("Admin Passwort:") === "admin") { remove(ref(db, "orders")); remove(ref(db, "settings")); }
    };

    const addOrder = () => {
        const input = document.getElementById("orderInput");
        const val = input.value.trim();
        if(!val) return;
        push(ref(db, "orders"), { name: val, user: userName, owner: userId }).then(() => { input.value = ""; });
    };

    document.getElementById("addOrderBtn").onclick = addOrder;
    document.getElementById("orderInput").addEventListener("keypress", (e) => { if(e.key === "Enter") addOrder(); });

    onValue(ref(db, "orders"), snap => {
        const listEl = document.getElementById("list");
        const waLeiste = document.getElementById("waLeiste");
        const orderBox = document.getElementById("orderBox");
        const container = document.getElementById("mainContainer");
        const detailsEl = document.getElementById("orderBoxDetails");
        
        if (currentlyEditing !== null) return;
        listEl.innerHTML = "";
        
        if(!snap.exists()) { 
            waLeiste.style.display = "none"; 
            orderBox.style.display = "none";
            container.classList.remove("has-content");
            return; 
        }
        
        let orderCount = 0;
        snap.forEach(child => {
            orderCount++;
            const d = child.val();
            const key = child.key;
            const li = document.createElement("li");
            const canEdit = isGlobalActive && (d.owner === userId || userId === currentAdminId);

            li.innerHTML = `
                <div class="order-row" id="view-${key}">
                    <div class="order-info"><span class="user-label">${d.user}</span><span class="food-name">${d.name}</span></div>
                    ${canEdit ? `<button class="edit-btn" onclick="window.startEdit('${key}')">Ändern</button>` : ""}
                </div>
                <div class="edit-container" id="edit-${key}" style="display:none">
                    <input class="edit-input" id="inp-${key}" value="${d.name}" autocomplete="off">
                    <div class="edit-actions">
                        <button class="del-btn" onclick="window.deleteOrder('${key}')">Löschen</button>
                        <button class="save-btn" onclick="window.saveOrder('${key}')">Speichern</button>
                    </div>
                </div>`;
            listEl.appendChild(li);
        });

        container.classList.add("has-content");
        waLeiste.style.display = "flex";
        orderBox.style.display = "block";
        // Zähler im UI Kästchen aktualisieren
        detailsEl.innerText = `Aktuelle Bestellungen (${orderCount})`;
    });

    window.startEdit = (key) => {
        currentlyEditing = key;
        document.getElementById(`view-${key}`).style.display = 'none';
        document.getElementById(`edit-${key}`).style.display = 'flex';
        document.getElementById(`inp-${key}`).focus();
    };

    window.saveOrder = (key) => {
        const newVal = document.getElementById(`inp-${key}`).value;
        if(newVal.trim()) {
            update(ref(db, `orders/${key}`), { name: newVal.trim() }).then(() => {
                currentlyEditing = null;
            });
        }
    };

    window.deleteOrder = (key) => {
        if(confirm("Löschen?")) {
            remove(ref(db, `orders/${key}`)).then(() => {
                currentlyEditing = null;
            });
        }
    };

    document.getElementById("shareWaBtn").onclick = async () => {
        const sSnap = await get(ref(db, "settings"));
        const s = sSnap.val() || {};
        const oSnap = await get(ref(db, "orders"));
        
        let count = 0;
        let listText = "";
        
        // Jede Mahlzeit einzeln auflisten ohne Zusammenrechnen
        oSnap.forEach(child => {
            count++;
            listText += `• ${child.val().name}\n`;
        });

        let m = `*🍽️ BESTELLUNG: ${s.restaurant || '---'}*\n`;
        m += `🕒 Zeit: ${s.time || '---'} Uhr\n`;
        m += `🚪 Tor: ${s.gate || '---'}\n`;
        m += `📦 Gesamt: *${count} Mahlzeiten*\n`;
        m += `––––––––––––––––––\n`;
        m += listText;
        
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
    };
</script>
