<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestell-Liste</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        .app-header {
            width: 100%;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.08) 0%, rgba(248, 250, 252, 0) 100%);
            padding: 30px 20px 10px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            margin-bottom: 15px;
        }

        .header-content { display: flex; align-items: center; gap: 15px; }

        .header-logo {
            width: 60px; height: 60px; border-radius: 50%;
            background: #fff; object-fit: cover; border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 36px; font-weight: 900; margin: 0; letter-spacing: -1.5px;
            background: linear-gradient(135deg, #1e293b 30%, #3b82f6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #timerDisplay {
            background: #fee2e2; color: #dc2626; padding: 14px; border-radius: 18px;
            font-weight: 800; text-align: center; margin-bottom: 15px;
            display: none; border: 1.5px solid #fecaca; font-size: 14px;
        }

        #nameBtn {
            width: 100%; background: rgba(59, 130, 246, 0.05); color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.2); padding: 12px; border-radius: 14px;
            font-weight: 600; font-size: 14px; margin-bottom: 25px; cursor: pointer;
        }

        .card {
            background: var(--card-bg); padding: 24px; border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); margin-bottom: 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .label { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; }

        input, select {
            width: 100%; padding: 14px; margin: 4px 0 20px 0; border-radius: 14px;
            border: 1.5px solid #f1f5f9; background: #f8fafc; font-size: 16px;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        #startBtn { color: white; background: var(--primary); }
        .add-btn { background: var(--success); color: white; }

        ul { padding: 0; margin: 0; list-style: none; width: 100%; }
        li {
            background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px;
            border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 3px 10px rgba(0,0,0,0.02);
        }

        .item-content { display: flex; flex-direction: column; gap: 5px; }
        .user-label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .food-name { font-weight: 700; font-size: 20px; color: var(--text-main); line-height: 1.2; }

        .edit-btn { background: #f1f5f9; color: var(--text-muted); border-radius: 10px; padding: 8px 12px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 10px; align-self: flex-start; }

        .controls { display: none; margin-top: 15px; gap: 8px; flex-direction: column; }
        .controls.active { display: flex; }
        .control-btn { padding: 12px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; }

        /* MODAL FIX */
        #timeModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 2000; width: 90%; max-width: 320px; text-align: center;
        }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 1999; }
        
        #deadlineInput {
            text-align: center; font-size: 24px; font-weight: 700; 
            margin: 10px 0 20px 0;
            width: 100%; 
            padding: 10px; /* Reduziertes Padding für bessere Passform */
            display: block;
            border: 1.5px solid #f1f5f9;
        }

        .wa-sticky-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(0deg, #f8fafc 40%, transparent 100%); display: flex; justify-content: center; z-index: 1000; }
        .wa-btn { background: var(--whatsapp); color: white; text-decoration: none; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); max-width: 460px; width: 100%; }

        #clearBtn { position: fixed; bottom: 100px; right: 25px; background: white; border-radius: 50%; width: 50px; height: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 999; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-content">
            <img src="logo.png" alt="Logo" class="header-logo">
            <h1>Bestell-Liste</h1>
        </div>
    </header>

    <div class="container">
        <div id="timerDisplay">⌛ Ende der Bestellung: <span id="endTimeText">--:--</span> | <span id="timeLeft">--:--</span></div>

        <button id="nameBtn">👤 Profil lädt...</button>

        <div class="card">
            <span class="label">📍 Restaurant / Laden</span>
            <input id="restaurant" placeholder="z. B. Baron">
            <span class="label">🕒 Lieferung zu</span>
            <input id="time" placeholder="z. B. 17:20 Uhr">
            <span class="label">🚪 Ort</span>
            <select id="gate"><option>Nord-Tor</option><option>Haupt-Tor</option></select>
            <button id="startBtn" class="btn">Laden...</button>
        </div>

        <div class="card" id="orderCard" style="display:none; border: 2.5px solid rgba(34, 197, 94, 0.3); background: #f0fdf4;">
            <span class="label">Was möchtest du essen?</span>
            <input id="order" placeholder="z. B. Döner ohne Zwiebeln">
            <button id="addOrderBtn" class="btn add-btn">+ Zur Liste hinzufügen</button>
        </div>

        <ul id="list"></ul>
    </div>

    <div id="modalOverlay"></div>
    <div id="timeModal">
        <span class="label">Bis wann eintragen?</span>
        <input type="time" id="deadlineInput" value="12:00">
        <button id="confirmStartBtn" class="btn" style="background: var(--primary); color: white; margin-top: 5px; padding: 12px;">Bestellung starten</button>
        <button id="cancelModalBtn" class="btn" style="background: #f1f5f9; color: var(--text-muted); margin-top: 8px; padding: 10px; font-size: 14px;">Abbrechen</button>
    </div>

    <div class="wa-sticky-container">
        <button id="shareWaBtn" class="btn wa-btn">Gesamtliste auf WhatsApp teilen</button>
    </div>

    <button id="clearBtn">🧹</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
        databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let userId = localStorage.getItem("userId") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
    let userName = localStorage.getItem("userName") || prompt("Wie heißt du?");
    localStorage.setItem("userName", userName || "Gast");

    const nameBtn = document.getElementById("nameBtn");
    const updateNameBtn = () => nameBtn.innerText = `👤 ${userName} (Name ändern)`;
    updateNameBtn();

    nameBtn.onclick = () => {
        let n = prompt("Neuer Name:", userName);
        if(n) { userName = n; localStorage.setItem("userName", n); updateNameBtn(); }
    };

    let countdownInterval;
    function runTimer(endTime) {
        clearInterval(countdownInterval);
        const display = document.getElementById("timerDisplay");
        const spanTimeLeft = document.getElementById("timeLeft");
        const spanEndTime = document.getElementById("endTimeText");
        
        const dateObj = new Date(endTime);
        const hours = dateObj.getHours().toString().padStart(2, '0');
        const mins = dateObj.getMinutes().toString().padStart(2, '0');
        spanEndTime.innerText = `${hours}:${mins} Uhr`;

        display.style.display = "block";
        countdownInterval = setInterval(() => {
            const now = new Date().getTime();
            const diff = endTime - now;
            if (diff <= 0) {
                clearInterval(countdownInterval);
                display.innerHTML = "🚫 Bestellzeit beendet!";
                document.getElementById("orderCard").style.display = "none";
                return;
            }
            const m = Math.floor(diff / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            spanTimeLeft.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);
    }

    onValue(ref(db, "settings"), snap => {
        const d = snap.val() || {};
        const isActive = d.orderActive && new Date().getTime() < d.endTime;
        const startBtn = document.getElementById("startBtn");
        startBtn.innerText = isActive ? "🛑 Stoppen" : "🟢 Starten";
        startBtn.style.background = isActive ? "var(--danger)" : "var(--primary)";
        document.getElementById("orderCard").style.display = isActive ? "block" : "none";
        ['restaurant', 'time', 'gate'].forEach(id => document.getElementById(id).disabled = isActive);
        if(isActive) runTimer(d.endTime); else document.getElementById("timerDisplay").style.display = "none";
    });

    document.getElementById("startBtn").onclick = async () => {
        const snap = await get(ref(db, "settings"));
        if (snap.val()?.orderActive) {
            if(prompt("Passwort zum Stoppen:") === "stop") update(ref(db, "settings"), { orderActive: false });
        } else {
            document.getElementById("modalOverlay").style.display = "block";
            document.getElementById("timeModal").style.display = "block";
        }
    };

    const closeModal = () => {
        document.getElementById("modalOverlay").style.display = "none";
        document.getElementById("timeModal").style.display = "none";
    };
    document.getElementById("cancelModalBtn").onclick = closeModal;

    document.getElementById("confirmStartBtn").onclick = () => {
        const t = document.getElementById("deadlineInput").value;
        if (!t) return;
        const [h, m] = t.split(":").map(Number);
        const end = new Date(); end.setHours(h, m, 0, 0);
        if (end < new Date()) end.setDate(end.getDate() + 1);
        update(ref(db, "settings"), { 
            orderActive: true, 
            endTime: end.getTime(), 
            restaurant: document.getElementById("restaurant").value, 
            time: document.getElementById("time").value, 
            gate: document.getElementById("gate").value 
        });
        closeModal();
    };

    const addOrder = () => {
        const input = document.getElementById("order");
        const val = input.value.trim();
        if(!val) return;
        push(ref(db, "orders"), { name: val, user: userName, owner: userId });
        input.value = "";
    };
    document.getElementById("addOrderBtn").onclick = addOrder;
    document.getElementById("order").onkeypress = (e) => { if(e.key === "Enter") addOrder(); };

    onValue(ref(db, "orders"), snap => {
        const list = document.getElementById("list"); list.innerHTML = "";
        if(!snap.exists()) return;
        snap.forEach(child => {
            const d = child.val();
            const li = document.createElement("li");
            li.innerHTML = `
                <div class="item-content">
                    <span class="user-label">${d.user}</span>
                    <span class="food-name" data-food="${d.name}">${d.name}</span>
                    ${d.owner === userId ? `<button class="edit-btn" id="edit-btn-${child.key}">Bearbeiten</button>` : ""}
                    <div id="c-${child.key}" class="controls">
                        <input id="inp-${child.key}" value="${d.name}">
                        <button class="control-btn" style="background:var(--danger)" id="del-${child.key}">Löschen</button>
                        <button class="control-btn" style="background:var(--primary); margin-top:5px" id="sav-${child.key}">💾 Speichern</button>
                    </div>
                </div>`;
            list.appendChild(li);

            if(d.owner === userId) {
                document.getElementById(`edit-btn-${child.key}`).onclick = () => document.getElementById(`c-${child.key}`).classList.toggle("active");
                document.getElementById(`del-${child.key}`).onclick = () => confirm("Löschen?") && remove(ref(db, `orders/${child.key}`));
                document.getElementById(`sav-${child.key}`).onclick = () => {
                    update(ref(db, `orders/${child.key}`), { name: document.getElementById(`inp-${child.key}`).value });
                    document.getElementById(`c-${child.key}`).classList.remove("active");
                };
            }
        });
    });

    document.getElementById("shareWaBtn").onclick = () => {
        let m = `*🍽️ BESTELLUNG: ${document.getElementById("restaurant").value}*\n🕒 Zeit: ${document.getElementById("time").value}\n🚪 Ort: ${document.getElementById("gate").value}\n––––––––––––––––––\n`;
        const sum = {}; 
        document.querySelectorAll(".food-name").forEach(i => { 
            const n = i.getAttribute("data-food"); 
            sum[n] = (sum[n] || 0) + 1; 
        });
        for (const [f, q] of Object.entries(sum)) {
            const qtyStr = q > 1 ? `*x${q}* ` : "";
            m += `• ${qtyStr}${f}\n`; 
        }
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
    };

    document.getElementById("clearBtn").onclick = () => {
        if(prompt("Passwort zum Leeren:") === "clear") {
            remove(ref(db, "orders"));
            update(ref(db, "settings"), {orderActive: false});
        }
    };
</script>
</body>
</html>
