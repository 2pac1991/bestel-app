<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestell-Liste Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        .app-header {
            width: 100%; background: #fff; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 20px; font-weight: 800; margin: 0; }

        #profileBtn {
            background: #f1f5f9; border: 1.5px solid #e2e8f0; padding: 8px 14px;
            border-radius: 12px; display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-weight: 600; font-size: 13px;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        /* Das Status-Display oben */
        #statusDisplay {
            background: white; border-radius: 20px; padding: 18px; margin-bottom: 20px;
            border: 2px solid #fee2e2; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.05);
            display: none;
        }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .status-item { background: #f8fafc; padding: 10px; border-radius: 12px; }
        .status-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; display: block; }
        .status-val { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .timer-highlight { grid-column: span 2; background: #fee2e2; color: #dc2626; text-align: center; border: 1px solid #fecaca; }

        .card {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        /* Die neue Box für alle Bestellungen untereinander */
        .order-preview-box {
            background: #fff;
            padding: 18px;
            border-radius: 18px;
            border: 2px solid var(--primary);
            margin-bottom: 20px;
            display: none;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.08);
        }
        .preview-label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 10px; display: block; border-bottom: 1px solid #eff6ff; padding-bottom: 5px; }
        .preview-content { font-size: 15px; font-weight: 600; color: var(--text-main); line-height: 1.6; }

        .label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }

        input, select {
            width: 100%; padding: 12px; margin: 4px 0 15px 0; border-radius: 12px;
            border: 2px solid #f1f5f9; background: #f8fafc; font-size: 16px;
            -webkit-appearance: none;
        }
        input:focus { border-color: var(--primary); background: #fff; outline: none; }

        .btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer;
        }

        .add-btn { background: var(--success); color: white; margin-top: 5px; }

        ul { padding: 0; list-style: none; width: 100%; margin: 0; }
        li {
            background: white; padding: 18px; border-radius: 18px; margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            width: 100%;
        }

        .order-row { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }
        .order-info { flex: 1; display: flex; flex-direction: column; }
        
        .user-label { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
        .food-name { font-weight: 700; font-size: 19px; color: var(--text-main); line-height: 1.2; }

        .edit-btn { 
            background: #f1f5f9; 
            color: var(--primary); 
            border: 1px solid #e2e8f0; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-left: 10px;
        }

        .edit-container { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .edit-input { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--primary); font-size: 16px; }
        .edit-actions { display: flex; gap: 8px; }
        .save-btn { background: var(--primary); color: white; padding: 8px 15px; border-radius: 8px; border: none; font-weight: 700; flex: 2; }
        .del-btn { background: var(--danger); color: white; padding: 8px 15px; border-radius: 8px; border: none; font-weight: 700; flex: 1; }

        #timeModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 2000; width: 85%; max-width: 320px; text-align: center;
        }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); z-index: 1999; }

        .wa-sticky { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(0deg, #f8fafc 80%, transparent); display: none; justify-content: center; z-index: 1000; }
        .wa-btn { background: var(--whatsapp); color: white; border: none; border-radius: 15px; font-weight: 700; padding: 16px; width: 100%; max-width: 460px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .wa-btn svg { width: 22px; height: 22px; fill: white; }

        #clearBtn { position: fixed; bottom: 100px; right: 20px; background: white; border: 1px solid #eee; width: 45px; height: 45px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; z-index: 999; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <img src="logo.png" alt="Logo" class="header-logo">
            <h1>Bestell-Liste</h1>
        </div>
        <button id="profileBtn">
            <span>👤</span>
            <span id="userNameDisplay">...</span>
        </button>
    </header>

    <div class="container">
        <div id="statusDisplay">
            <div class="status-grid">
                <div class="status-item timer-highlight">
                    <span class="status-label">⌛ Bestellschluss</span>
                    <div class="status-val" id="disp-deadline">--:-- Uhr</div>
                </div>
                <div class="status-item">
                    <span class="status-label">📍 Restaurant</span>
                    <div class="status-val" id="disp-res">---</div>
                </div>
                <div class="status-item">
                    <span class="status-label">🕒 Lieferung</span>
                    <div class="status-val" id="disp-time">---</div>
                </div>
                <div class="status-item" style="grid-column: span 2;">
                    <span class="status-label">📦 Kammerl </span>
                    <div class="status-val" id="disp-cham">---</div>
                </div>
            </div>
            <button id="stopActionBtn" class="btn" style="margin-top:15px; background: var(--danger); color:white;">🛑 Bestellung Stoppen</button>
        </div>

        <div id="setupCard" class="card">
            <span class="label">📍 Restaurant</span>
            <input id="restaurant" placeholder="z. B. Baron" autocomplete="off">
            <span class="label">🕒 Lieferung um</span>
            <input id="time" placeholder="z. B. 17:20 Uhr" autocomplete="off">
            <span class="label">🍴 Kammerl</span>
            <select id="chamber"><option>Spinnereikammerl</option><option>NB-Kammerl</option></select>
            <span class="label">🚪 Tor </span>
            <select id="gate"><option>Nord-Tor</option><option>Haupt-Tor</option></select>
            <button id="startBtn" class="btn" style="background: var(--primary); color: white;">🟢 Bestellung Starten</button>
        </div>

        <div id="orderCard" class="card" style="display:none; border: 2px solid #22c55e; background: #f0fdf4;">
            <span class="label">Deine Bestellung</span>
            <input id="orderInput" type="text" placeholder="Was möchtest du?" autocomplete="off">
            <button id="addOrderBtn" class="btn add-btn">+ Hinzufügen</button>
        </div>

        <div id="orderPreviewBox" class="order-preview-box">
            <span class="preview-label">Bestellungen:</span>
            <div id="previewContent" class="preview-content"></div>
        </div>

        <ul id="list"></ul>
    </div>

    <div id="modalOverlay"></div>
    <div id="timeModal">
        <span class="label">Einsendeschluss festlegen</span>
        <input type="time" id="deadlineInput" value="11:30">
        <button id="confirmStartBtn" class="btn" style="background: var(--primary); color: white;">Starten</button>
        <button id="cancelModalBtn" class="btn" style="background: #f1f5f9; color: #64748b; margin-top: 8px;">Abbrechen</button>
    </div>

    <div id="waLeiste" class="wa-sticky">
        <button id="shareWaBtn" class="wa-btn">
            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.445 0 .081 5.363.079 11.971c0 2.112.551 4.176 1.596 5.979L0 24l6.15-1.613a11.826 11.826 0 005.897 1.568h.005c6.604 0 11.967-5.363 11.97-11.971a11.811 11.811 0 00-3.505-8.469z"/></svg>
            Auf WhatsApp teilen
        </button>
    </div>

    <button id="clearBtn">🧹</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = { apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs", databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let userId = localStorage.getItem("userId") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
    let userName = localStorage.getItem("userName") || prompt("Wie heißt du?") || "Gast";
    localStorage.setItem("userName", userName);
    document.getElementById("userNameDisplay").innerText = userName;

    let currentlyEditing = null;

    document.getElementById("profileBtn").onclick = () => {
        let n = prompt("Neuer Name:", userName);
        if(n && n.trim() !== "") { userName = n.trim(); localStorage.setItem("userName", userName); document.getElementById("userNameDisplay").innerText = userName; }
    };

    onValue(ref(db, "settings"), snap => {
        const d = snap.val() || {};
        const now = new Date().getTime();
        const isActive = d.orderActive && now < d.endTime;
        document.getElementById("setupCard").style.display = isActive ? "none" : "block";
        document.getElementById("statusDisplay").style.display = isActive ? "block" : "none";
        document.getElementById("orderCard").style.display = isActive ? "block" : "none";
        if(isActive) {
            const date = new Date(d.endTime);
            document.getElementById("disp-deadline").innerText = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0') + " Uhr";
            document.getElementById("disp-res").innerText = d.restaurant || "---";
            document.getElementById("disp-time").innerText = d.time || "---";
            document.getElementById("disp-cham").innerText = d.chamber || "---";
        }
    });

    document.getElementById("startBtn").onclick = () => {
        document.getElementById("modalOverlay").style.display = "block";
        document.getElementById("timeModal").style.display = "block";
    };

    document.getElementById("confirmStartBtn").onclick = () => {
        const t = document.getElementById("deadlineInput").value;
        const [h, m] = t.split(":").map(Number);
        const end = new Date(); end.setHours(h, m, 0, 0);
        if (end < new Date()) end.setDate(end.getDate() + 1);
        update(ref(db, "settings"), { orderActive: true, endTime: end.getTime(), restaurant: document.getElementById("restaurant").value, time: document.getElementById("time").value, chamber: document.getElementById("chamber").value, gate: document.getElementById("gate").value });
        document.getElementById("modalOverlay").style.display = "none";
        document.getElementById("timeModal").style.display = "none";
    };

    document.getElementById("stopActionBtn").onclick = () => { if(prompt("Passwort:") === "stop") update(ref(db, "settings"), { orderActive: false }); };
    document.getElementById("cancelModalBtn").onclick = () => { document.getElementById("modalOverlay").style.display = "none"; document.getElementById("timeModal").style.display = "none"; };

    const addOrder = () => {
        const input = document.getElementById("orderInput");
        const val = input.value.trim();
        if(!val) return;
        push(ref(db, "orders"), { name: val, user: userName, owner: userId }).then(() => { input.value = ""; });
    };

    document.getElementById("addOrderBtn").onclick = addOrder;
    document.getElementById("orderInput").addEventListener("keypress", (e) => { if(e.key === "Enter") addOrder(); });

    onValue(ref(db, "orders"), snap => {
        const listEl = document.getElementById("list");
        const waLeiste = document.getElementById("waLeiste");
        const previewBox = document.getElementById("orderPreviewBox");
        const previewContent = document.getElementById("previewContent");
        
        let activeInputVal = "";
        if (currentlyEditing) {
            const activeInp = document.getElementById(`inp-${currentlyEditing}`);
            if (activeInp) activeInputVal = activeInp.value;
        }

        listEl.innerHTML = "";
        previewContent.innerHTML = "";
        
        if(!snap.exists()) { 
            waLeiste.style.display = "none"; 
            previewBox.style.display = "none";
            return; 
        }

        waLeiste.style.display = "flex";
        previewBox.style.display = "block";
        
        snap.forEach(child => {
            const d = child.val();
            const key = child.key;

            // In die neue Box hinzufügen (Name: Essen)
            const div = document.createElement("div");
            div.innerText = `${d.user}: ${d.name}`;
            previewContent.appendChild(div);

            // In die Detail-Liste unten hinzufügen
            const li = document.createElement("li");
            li.id = `li-${key}`;
            const isEditing = currentlyEditing === key;

            li.innerHTML = `
                <div class="order-row" id="view-${key}" style="display: ${isEditing ? 'none' : 'flex'}">
                    <div class="order-info">
                        <span class="user-label">${d.user}</span>
                        <span class="food-name" data-food="${d.name}">${d.name}</span>
                    </div>
                    ${d.owner === userId ? `<button class="edit-btn" onclick="window.startEdit('${key}')">Bearbeiten</button>` : ""}
                </div>
                <div class="edit-container" id="edit-${key}" style="display: ${isEditing ? 'flex' : 'none'}">
                    <span class="user-label">${d.user}</span>
                    <input class="edit-input" id="inp-${key}" value="${isEditing ? activeInputVal || d.name : d.name}" autocomplete="off">
                    <div class="edit-actions">
                        <button class="del-btn" onclick="window.deleteOrder('${key}')">Löschen</button>
                        <button class="save-btn" onclick="window.saveOrder('${key}')">Speichern</button>
                    </div>
                </div>`;
            listEl.appendChild(li);
        });
    });

    window.startEdit = (key) => {
        currentlyEditing = key;
        const viewEl = document.getElementById(`view-${key}`);
        const editEl = document.getElementById(`edit-${key}`);
        if(viewEl) viewEl.style.display = 'none';
        if(editEl) {
            editEl.style.display = 'flex';
            document.getElementById(`inp-${key}`).focus();
        }
    };

    window.saveOrder = (key) => {
        const newVal = document.getElementById(`inp-${key}`).value;
        if(newVal.trim()) {
            update(ref(db, `orders/${key}`), { name: newVal.trim() }).then(() => {
                currentlyEditing = null;
            });
        }
    };

    window.deleteOrder = (key) => {
        if(confirm("Diesen Eintrag wirklich löschen?")) {
            remove(ref(db, `orders/${key}`)).then(() => {
                currentlyEditing = null;
            });
        }
    };

    document.getElementById("shareWaBtn").onclick = async () => {
        const snap = await get(ref(db, "settings"));
        const s = snap.val() || {};
        let m = `*🍽️ BESTELLUNG: ${s.restaurant || '---'}*\n🕒 Zeit: ${s.time || '---'}\n🚪 Ort: ${s.gate || '---'}\n––––––––––––––––––\n`;
        const counts = {};
        document.querySelectorAll(".food-name").forEach(el => { const dish = el.getAttribute("data-food"); counts[dish] = (counts[dish] || 0) + 1; });
        for (const [dish, qty] of Object.entries(counts)) { m += `• ${qty > 1 ? qty + 'x ' : ''}${dish}\n`; }
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
    };

    document.getElementById("clearBtn").onclick = () => { if(prompt("Passwort:") === "clear") { remove(ref(db, "orders")); update(ref(db, "settings"), { orderActive: false }); } };
</script>
</body>
</html>
