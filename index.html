<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestell-Liste Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-header {
            width: 100%; background: #fff; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #eee; }
        h1 { font-size: 18px; font-weight: 800; margin: 0; }

        #profileBtn {
            background: #f1f5f9; border: 1.5px solid #e2e8f0; padding: 8px 12px;
            border-radius: 12px; display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-weight: 600; font-size: 13px;
        }

        .container { width: 100%; max-width: 500px; padding: 15px; }

        #statusDisplay {
            background: white; border-radius: 20px; padding: 18px; margin-bottom: 20px;
            border: 2px solid #fee2e2; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.05);
            display: none;
        }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .status-item { background: #f8fafc; padding: 10px; border-radius: 12px; }
        .status-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; display: block; }
        .status-val { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .timer-highlight { grid-column: span 2; background: #fee2e2; color: #dc2626; text-align: center; border: 1px solid #fecaca; }

        .card {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }

        input, select {
            width: 100%; padding: 12px; margin: 4px 0 15px 0; border-radius: 12px;
            border: 2px solid #f1f5f9; background: #f8fafc; font-size: 16px;
            color: var(--text-main);
        }
        input:focus { border-color: var(--primary); background: #fff; outline: none; }

        .btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer; transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }

        .add-btn { background: var(--success); color: white; }

        ul { padding: 0; list-style: none; width: 100%; margin: 0; }
        li {
            background: white; padding: 15px; border-radius: 18px; margin-bottom: 10px;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .order-row { display: flex; justify-content: space-between; align-items: center; }
        .user-label { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 2px; display: block; }
        .food-name { font-weight: 700; font-size: 17px; color: var(--text-main); }

        .edit-btn { 
            background: #f1f5f9; color: var(--text-muted); border: none; 
            padding: 8px 12px; border-radius: 10px; font-size: 14px; cursor: pointer;
        }

        .edit-container { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        .edit-actions { display: flex; gap: 8px; }
        .save-btn { background: var(--primary); color: white; padding: 10px; border-radius: 10px; border: none; font-weight: 700; flex: 2; }
        .del-btn { background: var(--danger); color: white; padding: 10px; border-radius: 10px; border: none; font-weight: 700; flex: 1; }

        #timeModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 2000; width: 85%; max-width: 320px;
        }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); z-index: 1999; }

        .wa-sticky { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(0deg, #f8fafc 80%, transparent); display: none; justify-content: center; z-index: 1000; }
        .wa-btn { background: var(--whatsapp); color: white; border: none; border-radius: 15px; font-weight: 700; padding: 16px; width: 100%; max-width: 460px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        
        #clearBtn { position: fixed; bottom: 100px; right: 20px; background: white; border: 1px solid #eee; width: 45px; height: 45px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; z-index: 999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <div class="header-logo" style="display: flex; align-items: center; justify-content: center; font-size: 20px;">🍕</div>
            <h1>Bestell-Liste</h1>
        </div>
        <button id="profileBtn">
            <span id="userNameDisplay">...</span>
        </button>
    </header>

    <div class="container">
        <div id="statusDisplay">
            <div class="status-grid">
                <div class="status-item timer-highlight">
                    <span class="status-label">⌛ Bestellschluss</span>
                    <div class="status-val" id="disp-deadline">--:-- Uhr</div>
                </div>
                <div class="status-item">
                    <span class="status-label">📍 Restaurant</span>
                    <div class="status-val" id="disp-res">---</div>
                </div>
                <div class="status-item">
                    <span class="status-label">🕒 Lieferung</span>
                    <div class="status-val" id="disp-time">---</div>
                </div>
            </div>
            <button id="stopActionBtn" class="btn" style="margin-top:15px; background: #fee2e2; color: #dc2626; font-size: 13px; padding: 8px;">Bestellung für alle beenden</button>
        </div>

        <div id="setupCard" class="card">
            <span class="label">📍 Restaurant</span>
            <input id="restaurant" placeholder="z.B. L'Osteria" autocomplete="off">
            <span class="label">🕒 Lieferung um</span>
            <input id="time" placeholder="z.B. 12:15 Uhr" autocomplete="off">
            <span class="label">📦 Kammerl / Ort</span>
            <select id="chamber"><option>Spinnereikammerl</option><option>NB-Kammerl</option></select>
            <span class="label">🚪 Tor (für WhatsApp)</span>
            <select id="gate"><option>Nord-Tor</option><option>Haupt-Tor</option></select>
            <button id="startBtn" class="btn" style="background: var(--primary); color: white;">Bestellrunde eröffnen</button>
        </div>

        <div id="orderCard" class="card" style="display:none; border: 2px solid var(--success);">
            <span class="label">Deine Bestellung</span>
            <input id="orderInput" type="text" placeholder="Was isst du?" autocomplete="off">
            <button id="addOrderBtn" class="btn add-btn">Hinzufügen</button>
        </div>

        <ul id="list"></ul>
    </div>

    <div id="modalOverlay"></div>
    <div id="timeModal">
        <h3 style="margin-top:0">Zeitlimit</h3>
        <span class="label">Wann ist Annahmeschluss?</span>
        <input type="time" id="deadlineInput" value="11:30">
        <button id="confirmStartBtn" class="btn" style="background: var(--primary); color: white;">Jetzt starten</button>
        <button id="cancelModalBtn" class="btn" style="background: transparent; color: var(--text-muted); margin-top: 10px;">Abbrechen</button>
    </div>

    <div id="waLeiste" class="wa-sticky">
        <button id="shareWaBtn" class="wa-btn">
            <span>Auf WhatsApp teilen</span>
        </button>
    </div>

    <button id="clearBtn">🧹</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs", 
        databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com" 
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // User Logik
    let userId = localStorage.getItem("userId") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
    
    let userName = localStorage.getItem("userName");
    if(!userName) {
        userName = prompt("Dein Name für die Liste:") || "Gast";
        localStorage.setItem("userName", userName);
    }
    document.getElementById("userNameDisplay").innerText = userName;

    document.getElementById("profileBtn").onclick = () => {
        let n = prompt("Name ändern:", userName);
        if(n && n.trim()) { 
            userName = n.trim(); 
            localStorage.setItem("userName", userName); 
            document.getElementById("userNameDisplay").innerText = userName;
            location.reload(); // Refresh um UI zu aktualisieren
        }
    };

    // State Tracking um Re-Render-Bugs beim Tippen zu verhindern
    let currentlyEditing = null;

    // Synchronisation der Einstellungen
    onValue(ref(db, "settings"), snap => {
        const d = snap.val() || {};
        const now = new Date().getTime();
        const isActive = d.orderActive && now < d.endTime;

        document.getElementById("setupCard").style.display = isActive ? "none" : "block";
        document.getElementById("statusDisplay").style.display = isActive ? "block" : "none";
        document.getElementById("orderCard").style.display = isActive ? "block" : "none";

        if(isActive) {
            const date = new Date(d.endTime);
            document.getElementById("disp-deadline").innerText = date.getHours().toString().padStart(2, '0') + ":" + date.getMinutes().toString().padStart(2, '0') + " Uhr";
            document.getElementById("disp-res").innerText = d.restaurant || "---";
            document.getElementById("disp-time").innerText = d.time || "---";
        }
    });

    // Bestellung starten
    document.getElementById("startBtn").onclick = () => {
        if(!document.getElementById("restaurant").value) return alert("Bitte Restaurant angeben");
        document.getElementById("modalOverlay").style.display = "block";
        document.getElementById("timeModal").style.display = "block";
    };

    document.getElementById("confirmStartBtn").onclick = () => {
        const t = document.getElementById("deadlineInput").value;
        const [h, m] = t.split(":").map(Number);
        const end = new Date(); end.setHours(h, m, 0, 0);
        if (end < new Date()) end.setDate(end.getDate() + 1);

        update(ref(db, "settings"), { 
            orderActive: true, 
            endTime: end.getTime(), 
            restaurant: document.getElementById("restaurant").value, 
            time: document.getElementById("time").value, 
            chamber: document.getElementById("chamber").value, 
            gate: document.getElementById("gate").value 
        });
        document.getElementById("modalOverlay").style.display = "none";
        document.getElementById("timeModal").style.display = "none";
    };

    document.getElementById("stopActionBtn").onclick = () => { 
        if(confirm("Bestellung für alle beenden?")) update(ref(db, "settings"), { orderActive: false }); 
    };

    document.getElementById("cancelModalBtn").onclick = () => { 
        document.getElementById("modalOverlay").style.display = "none"; 
        document.getElementById("timeModal").style.display = "none"; 
    };

    // Bestellungen verwalten
    const addOrder = () => {
        const input = document.getElementById("orderInput");
        const val = input.value.trim();
        if(!val) return;
        push(ref(db, "orders"), { name: val, user: userName, owner: userId });
        input.value = "";
        input.focus();
    };

    document.getElementById("addOrderBtn").onclick = addOrder;
    document.getElementById("orderInput").onkeypress = (e) => { if(e.key === "Enter") addOrder(); };

    onValue(ref(db, "orders"), snap => {
        if (currentlyEditing) return; // Verhindert UI-Sprung während man editiert

        const listEl = document.getElementById("list");
        const waLeiste = document.getElementById("waLeiste");
        listEl.innerHTML = "";
        
        if(!snap.exists()) { waLeiste.style.display = "none"; return; }
        waLeiste.style.display = "flex";
        
        snap.forEach(child => {
            const d = child.val();
            const key = child.key;
            const li = document.createElement("li");
            
            li.innerHTML = `
                <div class="order-row" id="view-${key}">
                    <div class="order-info">
                        <span class="user-label">${d.user}</span>
                        <span class="food-name" data-food="${d.name}">${d.name}</span>
                    </div>
                    ${d.owner === userId ? `<button class="edit-btn" onclick="window.startEdit('${key}')">✏️</button>` : ""}
                </div>
                <div class="edit-container" id="edit-${key}" style="display:none;">
                    <input class="edit-input" id="inp-${key}" value="${d.name}">
                    <div class="edit-actions">
                        <button class="del-btn" onclick="window.deleteOrder('${key}')">Löschen</button>
                        <button class="save-btn" onclick="window.saveOrder('${key}')">Speichern</button>
                    </div>
                </div>`;
            listEl.appendChild(li);
        });
    });

    // Globale Hilfsfunktionen für Inline-Edit
    window.startEdit = (key) => {
        currentlyEditing = key;
        document.getElementById(`view-${key}`).style.display = 'none';
        document.getElementById(`edit-${key}`).style.display = 'flex';
        document.getElementById(`inp-${key}`).focus();
    };

    window.saveOrder = (key) => {
        const newVal = document.getElementById(`inp-${key}`).value.trim();
        if(newVal) {
            update(ref(db, `orders/${key}`), { name: newVal }).then(() => {
                currentlyEditing = null;
            });
        }
    };

    window.deleteOrder = (key) => {
        if(confirm("Eintrag löschen?")) {
            remove(ref(db, `orders/${key}`)).then(() => {
                currentlyEditing = null;
            });
        }
    };

    // WhatsApp Export
    document.getElementById("shareWaBtn").onclick = async () => {
        const sSnap = await get(ref(db, "settings"));
        const s = sSnap.val() || {};
        
        let m = `*🍽️ BESTELLUNG: ${s.restaurant || 'Unbekannt'}*\n`;
        m += `🕒 Lieferung: *${s.time || '---'}*\n`;
        m += `📍 Abholung: *${s.chamber || '---'}* (${s.gate || '---'})\n`;
        m += `––––––––––––––––––\n`;

        const counts = {};
        document.querySelectorAll(".food-name").forEach(el => { 
            const dish = el.getAttribute("data-food"); 
            counts[dish] = (counts[dish] || 0) + 1; 
        });

        for (const [dish, qty] of Object.entries(counts)) {
            m += `• ${qty > 1 ? qty + 'x ' : ''}${dish}\n`;
        }
        
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`, '_blank');
    };

    document.getElementById("clearBtn").onclick = () => { 
        if(prompt("Passwort zum Leeren:") === "clear") { 
            remove(ref(db, "orders")); 
            update(ref(db, "settings"), { orderActive: false });
            location.reload();
        } 
    };
</script>
</body>
</html>
