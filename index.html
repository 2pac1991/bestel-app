<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bestell App</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:10px;}
h1{text-align:center;font-size:22px;}

.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.add{width:100%;background:#22c55e;color:white;}
.wa{width:100%;background:#25D366;color:white;margin-top:10px;}

li{
  list-style:none;
  background:#fff;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
}

.item-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:bold;
}

.edit-btn{
  background:#3b82f6;
  color:white;
  border-radius:50%;
  width:32px;
  height:32px;
}

.controls{
  display:none;
  gap:5px;
  margin-top:8px;
}

.controls.active{
  display:flex;
}

.controls button{flex:1;}

.plus{background:#22c55e;color:white;}
.minus{background:#f59e0b;color:white;}
.delete{background:#ef4444;color:white;}

.edit-input{
  width:100%;
  padding:8px;
  margin-top:8px;
}

#footer{text-align:center;margin-top:15px;}
#footer img{width:60px;height:60px;border-radius:50%;}

#clearBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ef4444;
  color:white;
  border-radius:50%;
  width:60px;
  height:60px;
}
</style>
</head>

<body>

<h1>🍽️ Bestell App</h1>

<div class="card">
<input id="order" placeholder="Was willst du essen?">
<button class="add" onclick="addOrder()">+ Bestellung</button>
</div>

<ul id="list"></ul>

<button class="wa" onclick="shareWhatsApp()">📲 WhatsApp</button>

<div id="footer">
<img src="logo.png">
</div>

<button id="clearBtn" onclick="clearAll()">🧹</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

let userId = localStorage.getItem("userId");
if(!userId){
  userId = Math.random().toString(36).substring(2);
  localStorage.setItem("userId", userId);
}

const app = initializeApp({
  apiKey:"AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
  databaseURL:"https://essen-bestelliste-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);
const list = document.getElementById("list");

onValue(ref(db,"orders"), snapshot=>{
  list.innerHTML="";
  if(!snapshot.exists()) return;

  snapshot.forEach(child=>{
    let data = child.val();

    let li = document.createElement("li");

    li.innerHTML = `
      <div class="item-top">
        <span id="text-${child.key}">${data.name} x${data.qty}</span>
        ${data.owner===userId ? `<button class="edit-btn" onclick="toggleEdit('${child.key}')">✏️</button>` : ""}
      </div>

      <input id="edit-${child.key}" class="edit-input" value="${data.name}" style="display:none">

      <div id="controls-${child.key}" class="controls">
        <button class="plus" onclick="changeQty('${child.key}', ${data.qty+1})">+</button>
        <button class="minus" onclick="changeQty('${child.key}', ${data.qty-1})">-</button>
        <button class="delete" onclick="deleteOrder('${child.key}')">🗑</button>
        <button onclick="saveEdit('${child.key}')">💾</button>
      </div>
    `;

    list.appendChild(li);
  });
});

window.toggleEdit = function(id){
  let controls = document.getElementById("controls-"+id);
  let input = document.getElementById("edit-"+id);

  controls.classList.toggle("active");
  input.style.display = input.style.display === "none" ? "block" : "none";
}

window.saveEdit = function(id){
  let value = document.getElementById("edit-"+id).value;

  update(ref(db,"orders/"+id),{
    name:value
  });
}

window.addOrder = function(){
  let input=document.getElementById("order");
  if(input.value==="") return;

  push(ref(db,"orders"),{
    name:input.value,
    qty:1,
    owner:userId
  });

  input.value="";
}

window.changeQty = function(id, qty){
  if(qty<=0){
    remove(ref(db,"orders/"+id));
  } else {
    update(ref(db,"orders/"+id), { qty: qty });
  }
}

window.deleteOrder = function(id){
  if(confirm("Löschen?")){
    remove(ref(db,"orders/"+id));
  }
}

window.shareWhatsApp = function(){
  let msg="Bestellung:\n";
  document.querySelectorAll(".item-top span").forEach(el=>{
    msg += el.innerText + "\n";
  });
  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

window.clearAll = function(){
  let pw = prompt("Passwort:");
  if(pw!=="clear") return;
  remove(ref(db,"orders"));
}
</script>

</body>
</html>
