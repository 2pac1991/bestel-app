<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestell-Liste</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            padding: 20px;
        }

        .app-header {
            width: 100%;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.08) 0%, rgba(248, 250, 252, 0) 100%);
            padding: 30px 20px 10px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            margin-bottom: 15px;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #fff;
            object-fit: cover;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 36px;
            font-weight: 900;
            margin: 0;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #1e293b 30%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }

        #timerDisplay {
            background: #fee2e2;
            color: #dc2626;
            padding: 14px;
            border-radius: 18px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            border: 1.5px solid #fecaca;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.1);
        }

        #nameBtn {
            width: 100%;
            background: rgba(59, 130, 246, 0.05);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 12px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03), 0 0 1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .label {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 4px 0 20px 0;
            border-radius: 14px;
            border: 1.5px solid #f1f5f9;
            background: #f8fafc;
            font-size: 16px;
            color: var(--text-main);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        #startBtn { color: white; background: var(--primary); }
        .add-btn { background: var(--success); color: white; margin-top: 10px; }
        
        .wa-sticky-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(0deg, rgba(248, 250, 252, 1) 40%, rgba(248, 250, 252, 0) 100%);
            display: flex;
            justify-content: center;
            z-index: 1000;
        }

        .wa-btn { 
            background: var(--whatsapp); 
            color: white; 
            text-decoration: none; 
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            max-width: 460px;
            width: 100%;
        }

        ul { padding: 0; margin: 0; }
        li {
            background: white;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            list-style: none;
        }

        .item-top { display: flex; justify-content: space-between; align-items: center; }
        .user-label { font-size: 11px; font-weight: 700; color: var(--primary); opacity: 0.8; }
        .food-name { font-weight: 700; font-size: 18px; display: block; margin-top: 2px; }

        /* Scroll-Rad Modal Styles */
        #timeModal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            z-index: 2000;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }
        #modalOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1999;
        }
        .modal-btn {
            margin-top: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        #clearBtn {
            position: fixed; bottom: 100px; right: 25px; background: white; border: none;
            border-radius: 50%; width: 50px; height: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 999;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="header-content">
            <img src="logo.png" alt="Logo" class="header-logo">
            <h1>Bestell-Liste</h1>
        </div>
    </header>

    <div class="container">
        <div id="timerDisplay">⌛ Deadline: <span id="timeLeft">--:--</span></div>

        <button id="nameBtn" onclick="changeName()">👤 Profil lädt...</button>

        <div class="card">
            <span class="label">📍 Restaurant / Laden</span>
            <input id="restaurant" placeholder="z. B. Baron">

            <span class="label">🕒 Uhrzeit</span>
            <input id="time" placeholder="z. B. 17:20 Uhr">

            <span class="label">🚪 Lieferung zu</span>
            <select id="gate">
                <option>Nord-Tor</option>
                <option>Haupt-Tor</option>
            </select>

            <button id="startBtn" class="btn" onclick="toggleOrder()">Laden...</button>
        </div>

        <div class="card" id="orderCard" style="display:none; border: 2.5px solid rgba(34, 197, 94, 0.3); background: #f0fdf4;">
            <span class="label">Deine Auswahl</span>
            <input id="order" placeholder="Was darf's sein?">
            <button class="btn add-btn" onclick="addOrder()">+ Hinzufügen</button>
        </div>

        <ul id="list"></ul>
    </div>

    <div id="modalOverlay"></div>
    <div id="timeModal">
        <span class="label">Bis wann kann man eintragen?</span>
        <input type="time" id="deadlineInput" value="12:00" style="text-align: center; font-size: 24px; margin-top: 10px;">
        <button class="modal-btn" style="background: var(--primary); color: white;" onclick="confirmOrderStart()">Bestellung starten</button>
        <button class="modal-btn" style="background: #f1f5f9; color: var(--text-muted); margin-top: 8px;" onclick="closeModal()">Abbrechen</button>
    </div>

    <div class="wa-sticky-container">
        <button class="btn wa-btn" onclick="shareWhatsApp()">
            Per WhatsApp teilen
        </button>
    </div>

    <button id="clearBtn" onclick="clearAll()">🧹</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
        databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let userId = localStorage.getItem("userId") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
    let userName = localStorage.getItem("userName") || prompt("Wie heißt du?");
    localStorage.setItem("userName", userName || "Gast");

    const updateNameButton = () => {
        document.getElementById("nameBtn").innerText = `👤 ${userName} (Name ändern)`;
    };
    updateNameButton();

    window.changeName = () => {
        let n = prompt("Neuer Name:", userName);
        if(n) { userName = n; localStorage.setItem("userName", n); updateNameButton(); }
    };

    // --- TIMER LOGIK ---
    let countdownInterval;
    function startCountdown(endTime) {
        clearInterval(countdownInterval);
        const display = document.getElementById("timerDisplay");
        const span = document.getElementById("timeLeft");
        display.style.display = "block";

        countdownInterval = setInterval(() => {
            const now = new Date().getTime();
            const diff = endTime - now;

            if (diff <= 0) {
                clearInterval(countdownInterval);
                display.innerHTML = "🚫 Bestellzeit abgelaufen!";
                document.getElementById("orderCard").style.display = "none";
                return;
            }

            const mins = Math.floor(diff / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            span.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }, 1000);
    }

    // --- UI UPDATES (Firebase Sync) ---
    onValue(ref(db, "settings"), snap => {
        const data = snap.val() || {};
        const isActive = data.orderActive || false;
        const endTime = data.endTime || 0;
        
        const startBtn = document.getElementById("startBtn");
        const orderCard = document.getElementById("orderCard");
        const fields = ['restaurant', 'time', 'gate'];

        if(isActive && new Date().getTime() < endTime) {
            startBtn.innerText = "🛑 Bestellung stoppen";
            startBtn.style.background = "var(--danger)";
            orderCard.style.display = "block";
            fields.forEach(id => document.getElementById(id).disabled = true);
            startCountdown(endTime);
        } else {
            startBtn.innerText = "🟢 Bestellung starten";
            startBtn.style.background = "var(--primary)";
            orderCard.style.display = "none";
            fields.forEach(id => document.getElementById(id).disabled = false);
            document.getElementById("timerDisplay").style.display = "none";
            clearInterval(countdownInterval);
        }
    });

    // --- MODAL STEUERUNG ---
    window.toggleOrder = async () => {
        const snap = await get(ref(db, "settings"));
        const current = snap.val() || {};

        if (current.orderActive) {
            if(prompt("Passwort zum Stoppen:") === "stop") {
                update(ref(db, "settings"), { orderActive: false });
            }
        } else {
            document.getElementById("modalOverlay").style.display = "block";
            document.getElementById("timeModal").style.display = "block";
        }
    };

    window.closeModal = () => {
        document.getElementById("modalOverlay").style.display = "none";
        document.getElementById("timeModal").style.display = "none";
    };

    window.confirmOrderStart = () => {
        const timeStr = document.getElementById("deadlineInput").value;
        if (timeStr) {
            const [h, m] = timeStr.split(":").map(Number);
            const end = new Date();
            end.setHours(h, m, 0, 0);
            
            if (end.getTime() < new Date().getTime()) end.setDate(end.getDate() + 1);

            update(ref(db, "settings"), { 
                orderActive: true, 
                endTime: end.getTime(),
                restaurant: document.getElementById("restaurant").value,
                time: document.getElementById("time").value,
                gate: document.getElementById("gate").value
            });
            closeModal();
        }
    };

    // --- BESTELLUNGEN ---
    window.addOrder = async () => {
        const input = document.getElementById("order");
        const val = input.value.trim();
        if(!val) return;
        const snap = await get(ref(db, "orders"));
        let foundKey = null, foundQty = 0;
        if(snap.exists()) {
            snap.forEach(c => {
                if(c.val().owner === userId && c.val().name.toLowerCase() === val.toLowerCase()) {
                    foundKey = c.key; foundQty = c.val().qty || 1;
                }
            });
        }
        if(foundKey) update(ref(db, `orders/${foundKey}`), { qty: foundQty + 1 });
        else push(ref(db, "orders"), { name: val, user: userName, owner: userId, qty: 1 });
        input.value = "";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    };

    document.getElementById("order").addEventListener("keypress", (e) => { if(e.key === "Enter") addOrder(); });

    onValue(ref(db, "orders"), snap => {
        const list = document.getElementById("list");
        list.innerHTML = "";
        if(!snap.exists()) return;
        snap.forEach(child => {
            const d = child.val();
            const li = document.createElement("li");
            li.innerHTML = `
                <div class="item-top">
                    <div>
                        <span class="user-label">${d.user}</span>
                        <span class="food-name" data-food="${d.name}" data-qty="${d.qty}">${d.name} <span style="color:var(--primary)">x${d.qty}</span></span>
                    </div>
                </div>`;
            list.appendChild(li);
        });
    });

    window.shareWhatsApp = () => {
        let m = `*🍽️ BESTELL-LISTE: ${document.getElementById("restaurant").value}*\n🕒 Zeit: ${document.getElementById("time").value}\n🚪 Ort: ${document.getElementById("gate").value}\n––––––––––––––––––\n`;
        const summary = {};
        document.querySelectorAll(".food-name").forEach(i => {
            const n = i.getAttribute("data-food");
            const q = parseInt(i.getAttribute("data-qty"));
            summary[n] = (summary[n] || 0) + q;
        });
        for (const [f, q] of Object.entries(summary)) m += `• ${q}x ${f}\n`;
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
    };

    window.clearAll = () => prompt("Passwort:") === "clear" && (remove(ref(db, "orders")), update(ref(db, "settings"), {orderActive: false}));
</script>

</body>
</html>
