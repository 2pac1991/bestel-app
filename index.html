<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bestell App D-Schicht</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
  padding:10px;
}

h1{
  text-align:center;
  font-size:22px;
  margin-bottom:15px;
}

/* Cards */
.card{
  background:white;
  padding:12px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* Inputs */
input{
  width:100%;
  padding:12px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

/* Buttons */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

/* Add Button */
.add{
  width:100%;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

/* WhatsApp */
.wa{
  width:100%;
  background:#25D366;
  color:white;
  font-weight:bold;
  margin-top:10px;
}

/* Liste */
li{
  list-style:none;
  background:#fff;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* Zeile oben */
.item-top{
  display:flex;
  justify-content:space-between;
  font-size:16px;
  font-weight:bold;
}

/* Buttons unten */
.controls{
  display:flex;
  justify-content:space-between;
}

.controls button{
  flex:1;
  margin:2px;
  font-size:18px;
}

/* Farben */
.plus{background:#22c55e;color:white;}
.minus{background:#f59e0b;color:white;}
.delete{background:#ef4444;color:white;}

/* Footer */
#footer{
  text-align:center;
  margin-top:15px;
}

#footer img{
  width:50px;
  height:50px;
  border-radius:50%;
}

#footer span{
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<h1>🍽️ Bestell App D-Schicht</h1>

<div class="card">
📍 Restaurant
<input id="restaurant" placeholder="Baron">

🕒 Wann
<input id="time" placeholder="17:20 Uhr">
</div>

<div class="card">
<input id="order" placeholder="Was willst du essen?">
<button class="add" onclick="addOrder()">+ Bestellung hinzufügen</button>
</div>

<div class="card">
<h3>🧾 Bestellungen</h3>
<ul id="list"></ul>
</div>

<button class="wa" onclick="shareWhatsApp()">📲 WhatsApp teilen</button>

<div id="footer">
  <img src="logo.png">
  <span>© Kalorienkonferenz</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
  authDomain: "essen-bestelliste.firebaseapp.com",
  databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com",
  projectId: "essen-bestelliste",
  storageBucket: "essen-bestelliste.firebasestorage.app",
  messagingSenderId: "803473193065",
  appId: "1:803473193065:web:e8d4c0bd770191c4bf0af8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

// LIVE LISTE
onValue(ref(db,"orders"), snapshot=>{
  list.innerHTML="";
  if(!snapshot.exists()) return;

  snapshot.forEach(child=>{
    let data = child.val();

    let li = document.createElement("li");

    li.innerHTML = `
      <div class="item-top">
        <span>${data.name}</span>
        <span>x${data.qty}</span>
      </div>

      <div class="controls">
        <button class="plus" onclick="changeQty('${child.key}', ${data.qty+1})">+</button>
        <button class="minus" onclick="changeQty('${child.key}', ${data.qty-1})">-</button>
        <button class="delete" onclick="deleteOrder('${child.key}')">🗑</button>
      </div>
    `;

    list.appendChild(li);
  });
});

// ADD
window.addOrder = function(){
  let input=document.getElementById("order");
  let value=input.value.trim();
  if(value==="") return;

  push(ref(db,"orders"),{
    name:value,
    qty:1
  });

  input.value="";
}

// MENGE
window.changeQty = function(id, qty){
  if(qty <= 0){
    remove(ref(db,"orders/"+id));
  } else {
    update(ref(db,"orders/"+id), { qty: qty });
  }
}

// DELETE
window.deleteOrder = function(id){
  if(confirm("Löschen?")){
    remove(ref(db,"orders/"+id));
  }
}

// WHATSAPP
window.shareWhatsApp = function(){
  let restaurant=document.getElementById("restaurant").value;
  let time=document.getElementById("time").value;

  let msg="🍽️ Bestellung\n\n";
  msg+="📍 Restaurant: "+restaurant+"\n";
  msg+="🕒 Wann: "+time+"\n\n";

  document.querySelectorAll(".item-top").forEach(el=>{
    msg += "- " + el.innerText + "\n";
  });

  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
