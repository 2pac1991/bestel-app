<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell-Liste</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 500px; }

        /* Modernisierte Überschrift */
        h1 {
            font-size: 38px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 35px;
            letter-spacing: -1.5px;
            background: linear-gradient(135deg, #1e293b 30%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.05));
        }

        h1::after {
            content: '';
            display: block;
            width: 50px;
            height: 5px;
            background: var(--primary);
            margin: 10px auto 0;
            border-radius: 10px;
            opacity: 0.8;
        }

        /* User Button - jetzt dezenter */
        #nameBtn {
            width: 100%;
            background: rgba(59, 130, 246, 0.05);
            color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 25px;
            cursor: pointer;
        }

        /* Modern Cards */
        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03), 0 0 1px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .label {
            font-size: 12px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 14px;
            margin: 4px 0 20px 0;
            border-radius: 14px;
            border: 1.5px solid #f1f5f9;
            background: #f8fafc;
            font-size: 16px;
            color: var(--text-main);
        }

        input:focus {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            outline: none;
        }

        /* Buttons mit mehr Tiefe */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        #startBtn { color: white; background: var(--primary); }
        .add-btn { background: var(--success); color: white; margin-top: 10px; }
        .wa-btn { 
            background: #25D366; 
            color: white; 
            margin-top: 15px; 
            box-shadow: 0 8px 16px rgba(37, 211, 102, 0.2);
        }

        li {
            background: white;
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            list-style: none;
        }

        .user-label { font-size: 11px; font-weight: 700; color: var(--primary); opacity: 0.8; }
        .food-name { font-weight: 700; font-size: 18px; display: block; margin-top: 2px; }

        #orderCard { border: 2px solid rgba(34, 197, 94, 0.3); background: #f0fdf4; }

        #clearBtn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bestell-Liste</h1>

    <button id="nameBtn" onclick="changeName()">👤 Profil lädt...</button>

    <div class="card">
        <span class="label">📍 Wo wird bestellt?</span>
        <input id="restaurant" placeholder="z. B. Burger House">

        <span class="label">🕒 Wann wird bestellt?</span>
        <input id="time" placeholder="z. B. 12:00 Uhr">

        <span class="label">🚪 Treffpunkt</span>
        <select id="gate">
            <option>Nord-Tor</option>
            <option>Haupt-Tor</option>
            <option>Parkplatz</option>
        </select>

        <button id="startBtn" class="btn" onclick="toggleOrder()">Laden...</button>
    </div>

    <div class="card" id="orderCard">
        <span class="label">Deine Auswahl</span>
        <input id="order" placeholder="Was darf's sein?">
        <button class="btn add-btn" onclick="addOrder()">Speichern</button>
    </div>

    <ul id="list"></ul>

    <button class="btn wa-btn" onclick="shareWhatsApp()">
        📲 Per WhatsApp teilen
    </button>
</div>

<script type="module">
    // ... (Hier fügst du die Firebase-Logik von oben wieder ein)
</script>

</body>
</html>
