<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestell-Liste Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation;
        }

        .app-header {
            width: 100%; background: #fff; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1100;
        }

        .header-left { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        h1 { font-size: 20px; font-weight: 800; margin: 0; }

        #profileBtn {
            background: #f1f5f9; border: 1.5px solid #e2e8f0; padding: 8px 14px;
            border-radius: 12px; display: flex; align-items: center; gap: 8px;
            cursor: pointer; font-weight: 600; font-size: 13px;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        #statusDisplay {
            background: white; border-radius: 20px; padding: 18px; margin-bottom: 20px;
            border: 2px solid #fee2e2; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.05);
            display: none;
        }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .status-item { background: #f8fafc; padding: 10px; border-radius: 12px; }
        .status-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; display: block; }
        .status-val { font-size: 14px; font-weight: 700; color: var(--text-main); }
        .timer-highlight { grid-column: span 2; background: #fee2e2; color: #dc2626; text-align: center; border: 1px solid #fecaca; }

        .card {
            background: var(--card-bg); padding: 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }

        input, select {
            width: 100%; padding: 12px; margin: 4px 0 15px 0; border-radius: 12px;
            border: 2px solid #f1f5f9; background: #f8fafc; font-size: 16px;
            -webkit-appearance: none;
        }
        input:focus { border-color: var(--primary); background: #fff; outline: none; }

        .btn {
            width: 100%; padding: 15px; border-radius: 15px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer;
        }

        .add-btn { background: var(--success); color: white; margin-top: 5px; }

        .order-container-box {
            background: white; border-radius: 24px; border: 2px solid var(--primary);
            padding: 20px; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.1);
            margin-bottom: 20px; display: none;
        }
        .box-title {
            font-size: 12px; font-weight: 900; color: var(--primary);
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 15px; display: flex; align-items: center; gap: 8px;
        }
        .box-title::after { content: ""; height: 2px; background: #eff6ff; flex: 1; }

        ul { padding: 0; list-style: none; width: 100%; margin: 0; }
        li {
            background: white; padding: 15px 0; border-bottom: 1px solid #f1f5f9;
            width: 100%;
        }
        li:last-child { border-bottom: none; }

        .order-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .order-info { flex: 1; display: flex; flex-direction: column; }
        
        .user-label { font-size: 10px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 2px; }
        .food-name { font-weight: 700; font-size: 17px; color: var(--text-main); line-height: 1.2; }

        .edit-btn { 
            background: #f1f5f9; color: var(--text-muted); border: none; 
            padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer;
        }

        .edit-container { display: flex; flex-direction: column; gap: 8px; width: 100%; padding: 10px; background: #f8fafc; border-radius: 12px; }
        .edit-input { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--primary); font-size: 16px; margin: 0; }
        .edit-actions { display: flex; gap: 8px; }
        .save-btn { background: var(--primary); color: white; padding: 8px; border-radius: 8px; border: none; font-weight: 700; flex: 2; }
        .del-btn { background: var(--danger); color: white; padding: 8px; border-radius: 8px; border: none; font-weight: 700; flex: 1; }

        .stop-btn-minimal {
            background: none; border: 1px solid #e2e8f0; color: #94a3b8;
            padding: 8px; border-radius: 10px; font-size: 11px; font-weight: 600;
            cursor: pointer; width: 100%; margin-top: 15px; text-transform: uppercase;
        }

        #timeModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            z-index: 2000; width: 85%; max-width: 320px; text-align: center;
        }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.55); backdrop-filter: blur(4px); z-index: 1999; }

        .wa-sticky { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(0deg, #f8fafc 80%, transparent); display: none; justify-content: center; z-index: 1000; }
        .wa-btn { background: var(--whatsapp); color: white; border: none; border-radius: 15px; font-weight: 700; padding: 16px; width: 100%; max-width: 460px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .wa-btn svg { width: 22px; height: 22px; fill: white; }

        #clearBtn { position: fixed; bottom: 100px; right: 20px; background: white; border: 1px solid #eee; width: 45px; height: 45px; border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; z-index: 999; }
    </style>
</head>
<body>

</html>
