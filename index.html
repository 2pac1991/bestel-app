<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestell-Liste Pro</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        .app-header {
            width: 100%;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.1) 0%, transparent 100%);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
        }

        h1 { font-size: 28px; font-weight: 900; margin: 0; background: linear-gradient(135deg, #1e293b, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Timer Style */
        #timerDisplay {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 12px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 15px;
            display: none;
            border: 1px solid #fecaca;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }

        input, select {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px;
            border: 1.5px solid #e2e8f0; background: #fff; font-size: 16px;
        }

        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }

        .btn {
            width: 100%; padding: 15px; border-radius: 14px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        .btn:active { transform: scale(0.98); }
        #startBtn { background: var(--primary); color: white; }
        .add-btn { background: var(--success); color: white; }

        ul { padding: 0; list-style: none; }
        li {
            background: white; padding: 15px; border-radius: 18px; margin-bottom: 10px;
            border: 1px solid #f1f5f9; box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .item-top { display: flex; justify-content: space-between; align-items: center; }
        .user-label { font-size: 10px; color: var(--primary); font-weight: 700; }
        .food-name { font-weight: 700; font-size: 17px; }

        .controls { display: none; margin-top: 12px; gap: 5px; flex-wrap: wrap; }
        .controls.active { display: flex; }
        .control-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; color: white; font-weight: bold; }

        .wa-sticky-container {
            position: fixed; bottom: 0; width: 100%; padding: 20px;
            background: linear-gradient(0deg, white 50%, transparent); z-index: 100;
        }
        .wa-btn { background: var(--whatsapp); color: white; text-decoration: none; box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3); }

        #clearBtn {
            position: fixed; bottom: 100px; right: 20px; background: white; border: none;
            border-radius: 50%; width: 45px; height: 45px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer; z-index: 99;
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>Bestell-Liste</h1>
    </header>

    <div class="container">
        <div id="timerDisplay">⏳ Zeit läuft ab: <span id="timeLeft">--:--</span></div>
        
        <button id="nameBtn" onclick="changeName()" style="width:100%; background:none; border:none; color:var(--primary); font-weight:600; margin-bottom:15px; cursor:pointer;">👤 Name laden...</button>

        <div class="card">
            <span class="label">📍 Wo wird bestellt?</span>
            <input id="restaurant" placeholder="z.B. Baron, Pizzeria...">
            <span class="label">🕒 Geplante Lieferung</span>
            <input id="time" placeholder="z.B. 12:30 Uhr">
            <span class="label">🚪 Ort</span>
            <select id="gate"><option>Nord-Tor</option><option>Haupt-Tor</option></select>
            <button id="startBtn" class="btn" onclick="toggleOrder()">Lade Modus...</button>
        </div>

        <div class="card" id="orderCard" style="display:none; border: 2px solid var(--success);">
            <span class="label">Deine Bestellung</span>
            <input id="order" placeholder="Was möchtest du essen?">
            <button class="btn add-btn" onclick="addOrder()">+ Hinzufügen</button>
        </div>

        <ul id="list"></ul>
    </div>

    <div class="wa-sticky-container">
        <button class="btn wa-btn" onclick="shareWhatsApp()">WhatsApp Liste teilen</button>
    </div>

    <button id="clearBtn" onclick="clearAll()">🧹</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
        databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let userId = localStorage.getItem("userId") || Math.random().toString(36).substr(2, 9);
    localStorage.setItem("userId", userId);
    let userName = localStorage.getItem("userName") || prompt("Dein Name?");
    localStorage.setItem("userName", userName || "Gast");

    const updateNameBtn = () => document.getElementById("nameBtn").innerText = `👤 ${userName} (ändern)`;
    updateNameBtn();
    window.changeName = () => { 
        let n = prompt("Neuer Name:", userName); 
        if(n) { userName = n; localStorage.setItem("userName", n); updateNameBtn(); }
    };

    // --- Timer & Bestellstatus Logik ---
    let countdownInterval;

    function startTimer(endTime) {
        clearInterval(countdownInterval);
        const display = document.getElementById("timerDisplay");
        const span = document.getElementById("timeLeft");
        
        display.style.display = "block";

        countdownInterval = setInterval(() => {
            const now = new Date().getTime();
            const diff = endTime - now;

            if (diff <= 0) {
                clearInterval(countdownInterval);
                display.innerHTML = "🚫 Bestellzeit abgelaufen!";
                document.getElementById("orderCard").style.display = "none";
                return;
            }

            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            span.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }, 1000);
    }

    // Synchronisiere Status mit Firebase (damit alle den gleichen Timer sehen)
    onValue(ref(db, "settings"), (snap) => {
        const data = snap.val() || {};
        const isActive = data.orderActive || false;
        const endTime = data.endTime || 0;
        
        const startBtn = document.getElementById("startBtn");
        const orderCard = document.getElementById("orderCard");
        const fields = ['restaurant', 'time', 'gate'];

        if(isActive && new Date().getTime() < endTime) {
            startBtn.innerText = "🛑 Stoppen (Admin)";
            startBtn.style.background = "var(--danger)";
            orderCard.style.display = "block";
            fields.forEach(id => document.getElementById(id).disabled = true);
            startTimer(endTime);
        } else {
            startBtn.innerText = "🟢 Bestellung starten";
            startBtn.style.background = "var(--primary)";
            orderCard.style.display = "none";
            fields.forEach(id => document.getElementById(id).disabled = false);
            document.getElementById("timerDisplay").style.display = "none";
            clearInterval(countdownInterval);
        }
    });

    window.toggleOrder = async () => {
        const snap = await get(ref(db, "settings"));
        const current = snap.val() || {};

        if (current.orderActive) {
            if(prompt("Passwort zum Stoppen:") === "stop") {
                update(ref(db, "settings"), { orderActive: false });
            }
        } else {
            const duration = prompt("Wie viele Minuten soll die Liste offen sein?", "15");
            if (duration) {
                const endTime = new Date().getTime() + (parseInt(duration) * 60000);
                update(ref(db, "settings"), { 
                    orderActive: true, 
                    endTime: endTime,
                    restaurant: document.getElementById("restaurant").value,
                    time: document.getElementById("time").value,
                    gate: document.getElementById("gate").value
                });
            }
        }
    };

    // --- Bestellungen verarbeiten ---
    window.addOrder = async () => {
        const input = document.getElementById("order");
        const val = input.value.trim();
        if(!val) return;

        const snap = await get(ref(db, "orders"));
        let foundKey = null, foundQty = 0;
        
        if(snap.exists()) {
            snap.forEach(c => {
                if(c.val().owner === userId && c.val().name.toLowerCase() === val.toLowerCase()) {
                    foundKey = c.key; foundQty = c.val().qty || 1;
                }
            });
        }

        if(foundKey) update(ref(db, `orders/${foundKey}`), { qty: foundQty + 1 });
        else push(ref(db, "orders"), { name: val, user: userName, owner: userId, qty: 1 });
        
        input.value = "";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    };

    // Enter-Taste Support
    document.getElementById("order").addEventListener("keypress", (e) => { if(e.key === "Enter") addOrder(); });

    onValue(ref(db, "orders"), snap => {
        const list = document.getElementById("list");
        list.innerHTML = "";
        if(!snap.exists()) return;
        snap.forEach(child => {
            const d = child.val();
            const li = document.createElement("li");
            li.innerHTML = `
                <div class="item-top">
                    <div>
                        <span class="user-label">${d.user}</span>
                        <span class="food-name" data-food="${d.name}" data-qty="${d.qty}">${d.name} <span style="color:var(--primary)">x${d.qty}</span></span>
                    </div>
                    ${d.owner === userId ? `<button onclick="toggleEdit('${child.key}')" style="background:#f1f5f9; border:none; padding:5px 10px; border-radius:8px; font-size:12px;">Bearbeiten</button>` : ""}
                </div>
                <div id="c-${child.key}" class="controls">
                    <input id="edit-${child.key}" value="${d.name}" style="margin-bottom:8px">
                    <div style="display:flex; gap:5px; width:100%">
                        <button class="control-btn" style="background:var(--success)" onclick="changeQty('${child.key}',1)">+</button>
                        <button class="control-btn" style="background:var(--warning)" onclick="changeQty('${child.key}',-1)">-</button>
                        <button class="control-btn" style="background:var(--danger)" onclick="deleteOrder('${child.key}')">🗑️</button>
                    </div>
                    <button class="control-btn" style="background:var(--primary); width:100%; margin-top:5px" onclick="saveEdit('${child.key}')">Speichern</button>
                </div>`;
            list.appendChild(li);
        });
    });

    window.toggleEdit = id => document.getElementById(`c-${id}`).classList.toggle("active");
    window.saveEdit = id => {
        update(ref(db, `orders/${id}`), { name: document.getElementById(`edit-${id}`).value });
        window.toggleEdit(id);
    };
    window.changeQty = (id, delta) => {
        const r = ref(db, `orders/${id}`);
        get(r).then(s => {
            const n = (s.val().qty || 1) + delta;
            n <= 0 ? remove(r) : update(r, { qty: n });
        });
    };
    window.deleteOrder = id => confirm("Löschen?") && remove(ref(db, `orders/${id}`));

    // WhatsApp mit Zusammenfassung
    window.shareWhatsApp = () => {
        const rest = document.getElementById("restaurant").value || "Bestellung";
        let m = `*🍽️ BESTELLUNG: ${rest.toUpperCase()}*\n🕒 Zeit: ${document.getElementById("time").value}\n🚪 Ort: ${document.getElementById("gate").value}\n––––––––––––––––––\n`;
        
        const summary = {};
        document.querySelectorAll(".food-name").forEach(i => {
            const n = i.getAttribute("data-food");
            const q = parseInt(i.getAttribute("data-qty"));
            summary[n] = (summary[n] || 0) + q;
        });

        for (const [food, qty] of Object.entries(summary)) {
            m += `✅ *${qty}x* ${food}\n`;
        }
        window.open(`https://wa.me/?text=${encodeURIComponent(m)}`);
    };

    window.clearAll = () => prompt("Passwort:") === "clear" && (remove(ref(db, "orders")), update(ref(db, "settings"), {orderActive: false}));
</script>
</body>
</html>
