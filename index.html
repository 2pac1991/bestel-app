<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bestell App D-Schicht</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;margin:0;}
h1{text-align:center;}

.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:8px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.add{background:#22c55e;color:white;}
.wa{background:#25D366;color:white;}

li{
  list-style:none;
  background:#fff;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.controls button{
  background:#eee;
}

/* Footer */
#footer{text-align:center;margin-top:20px;}
#footer img{width:60px;height:60px;border-radius:50%;}
#footer span{font-size:12px;color:#555;}
</style>
</head>

<body>

<h1>🍽️ Bestell App D-Schicht</h1>

<div class="card">
📍 Restaurant:<br>
<input id="restaurant" placeholder="Baron"><br>
🕒 Wann:<br>
<input id="time" placeholder="17:20 Uhr">
</div>

<div class="card">
<input id="order" placeholder="Bestellung">
<button class="add" onclick="addOrder()">+ Hinzufügen</button>
</div>

<div class="card">
<h3>🧾 Liste</h3>
<ul id="list"></ul>
</div>

<button class="wa" onclick="shareWhatsApp()">📲 WhatsApp teilen</button>

<div id="footer">
  <img src="logo.png">
  <span>© Kalorienkonferenz</span>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
  authDomain: "essen-bestelliste.firebaseapp.com",
  databaseURL: "https://essen-bestelliste-default-rtdb.firebaseio.com",
  projectId: "essen-bestelliste",
  storageBucket: "essen-bestelliste.firebasestorage.app",
  messagingSenderId: "803473193065",
  appId: "1:803473193065:web:e8d4c0bd770191c4bf0af8"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

// 🔥 LIVE LISTE
onValue(ref(db,"orders"), snapshot=>{
  list.innerHTML="";
  if(!snapshot.exists()) return;

  snapshot.forEach(child=>{
    let data = child.val();

    let li = document.createElement("li");

    li.innerHTML = `
      <span>${data.name} x${data.qty}</span>

      <div class="controls">
        <button onclick="changeQty('${child.key}', ${data.qty+1})">+</button>
        <button onclick="changeQty('${child.key}', ${data.qty-1})">-</button>
        <button onclick="deleteOrder('${child.key}')">🗑</button>
      </div>
    `;

    list.appendChild(li);
  });
});

// ➕ ADD
window.addOrder = function(){
  let input=document.getElementById("order");
  let value=input.value.trim();
  if(value==="") return;

  push(ref(db,"orders"),{
    name:value,
    qty:1
  });

  input.value="";
}

// 🔁 MENGE ÄNDERN
window.changeQty = function(id, qty){
  if(qty <= 0){
    remove(ref(db,"orders/"+id));
  } else {
    update(ref(db,"orders/"+id), { qty: qty });
  }
}

// ❌ DELETE
window.deleteOrder = function(id){
  if(confirm("Wirklich löschen?")){
    remove(ref(db,"orders/"+id));
  }
}

// 📲 WHATSAPP
window.shareWhatsApp = function(){
  let restaurant=document.getElementById("restaurant").value;
  let time=document.getElementById("time").value;

  let msg="🍽️ Bestellung\n\n";
  msg+="📍 Restaurant: "+restaurant+"\n";
  msg+="🕒 Wann: "+time+"\n\n";
  msg+="🧾 Essen:\n";

  document.querySelectorAll("#list li span").forEach(el=>{
    msg+="- "+el.innerText+"\n";
  });

  window.open("https://wa.me/?text="+encodeURIComponent(msg));
}
</script>

</body>
</html>
