<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestell App</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:10px;margin:0;}
h1{text-align:center;}

.card{background:white;padding:15px;border-radius:12px;margin-bottom:12px;}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:8px;
  color:white;
  font-size:16px;
}

.start{background:#22c55e;}
.stop{background:#ef4444;}

#status{text-align:center;font-weight:bold;margin:10px;}

input:disabled,select:disabled{
  background:#ddd;
}

.add{background:#22c55e;}
.wa{background:#25D366;margin-top:10px;}

li{
  background:white;
  padding:10px;
  border-radius:10px;
  margin:6px 0;
  list-style:none;
}

#clearBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:red;
}
</style>
</head>

<body>

<h1>🍽️ Bestell App</h1>

<div class="card">
<input id="restaurant" placeholder="Restaurant">
<input id="time" placeholder="Wann">
<select id="gate">
<option>Nord-Tor</option>
<option>Haupt-Tor</option>
</select>

<div id="status">🔴 gestoppt</div>
<button id="toggleBtn" class="start">Bestellung starten</button>
</div>

<div class="card">
<input id="order" placeholder="Deine Bestellung">
<button class="add" onclick="addOrder()">+ Bestellung</button>
</div>

<ul id="list"></ul>

<button class="wa" onclick="shareWhatsApp()">📲 WhatsApp</button>

<button id="clearBtn" onclick="clearAll()">🧹</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyAxhf0RYl9rDxaBUagwYIh8F35RDGpPZHs",
 databaseURL:"https://essen-bestelliste-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);

// STATUS LOCAL (kein Firebase → stabil!)
let running = false;

const btn = document.getElementById("toggleBtn");
const status = document.getElementById("status");

const restaurant = document.getElementById("restaurant");
const time = document.getElementById("time");
const gate = document.getElementById("gate");

// 🔥 BUTTON LOGIK
btn.onclick = () => {

  running = !running;

  if(running){
    status.innerText = "🟢 Bestellung läuft...";
    btn.innerText = "Bestellung stoppen";
    btn.className = "stop";

    restaurant.disabled = true;
    time.disabled = true;
    gate.disabled = true;

  }else{
    status.innerText = "🔴 Bestellung gestoppt";
    btn.innerText = "Bestellung starten";
    btn.className = "start";

    restaurant.disabled = false;
    time.disabled = false;
    gate.disabled = false;
  }
};

// BESTELLUNGEN
onValue(ref(db,"orders"), snap=>{
 list.innerHTML="";
 if(!snap.exists()) return;

 snap.forEach(c=>{
  let d = c.val();

  let li = document.createElement("li");
  li.innerText = d.user + ": " + d.name + " x" + (d.qty||1);

  list.appendChild(li);
 });
});

// USER
let user = localStorage.getItem("name") || prompt("Name?");
localStorage.setItem("name", user);

// ADD
window.addOrder = ()=>{
 let val = order.value;
 if(!val) return;

 push(ref(db,"orders"),{
  name:val,
  user:user,
  qty:1
 });

 order.value="";
}

// WHATSAPP
window.shareWhatsApp = ()=>{
 let msg="Bestellung:\n\n";

 document.querySelectorAll("li").forEach(li=>{
  msg += li.innerText + "\n";
 });

 window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

// CLEAR
window.clearAll = ()=>{
 let pw = prompt("Passwort:");
 if(pw==="clear"){
  remove(ref(db,"orders"));
 }
}
</script>

</body>
</html>
