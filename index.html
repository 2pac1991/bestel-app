<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bestell-Liste</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --whatsapp: #25D366;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; }

        .app-header {
            width: 100%;
            background: linear-gradient(180deg, rgba(59, 130, 246, 0.08) 0%, rgba(248, 250, 252, 0) 100%);
            padding: 30px 20px 10px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.1);
            margin-bottom: 15px;
        }

        .header-content { display: flex; align-items: center; gap: 15px; }

        .header-logo {
            width: 60px; height: 60px; border-radius: 50%;
            background: #fff; object-fit: cover; border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 36px; font-weight: 900; margin: 0; letter-spacing: -1.5px;
            background: linear-gradient(135deg, #1e293b 30%, #3b82f6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        #timerDisplay {
            background: #fee2e2; color: #dc2626; padding: 14px; border-radius: 18px;
            font-weight: 800; text-align: center; margin-bottom: 15px;
            display: none; border: 1.5px solid #fecaca; font-size: 14px;
        }

        #nameBtn {
            width: 100%; background: rgba(59, 130, 246, 0.05); color: var(--primary);
            border: 1px solid rgba(59, 130, 246, 0.2); padding: 12px; border-radius: 14px;
            font-weight: 600; font-size: 14px; margin-bottom: 25px; cursor: pointer;
        }

        .card {
            background: var(--card-bg); padding: 24px; border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); margin-bottom: 20px;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .label { font-size: 12px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; }

        input, select {
            width: 100%; padding: 14px; margin: 4px 0 20px 0; border-radius: 14px;
            border: 1.5px solid #f1f5f9; background: #f8fafc; font-size: 16px;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            font-weight: 700; font-size: 16px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        #startBtn { color: white; background: var(--primary); }
        .add-btn { background: var(--success); color: white; }

        ul { padding: 0; margin: 0; list-style: none; }
        li {
            background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px;
            border: 1px solid rgba(0,0,0,0.03); box-shadow: 0 3px 10px rgba(0,0,0,0.02);
        }

        .item-content { display: flex; flex-direction: column; gap: 5px; }
        .user-label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .food-name { font-weight: 700; font-size: 20px; color: var(--text-main); line-height: 1.2; }

        .edit-btn { background: #f1f5f9; color: var(--text-muted); border-radius: 10px; padding: 8px 12px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 10px; align-self: flex-start; }

        .controls { display: none; margin-top: 15px; gap: 8px; flex-direction: column; }
        .controls.active { display: flex; }
        .control-btn { padding: 12px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; }

        /* KORRIGIERTES MODAL DESIGN */
        #timeModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 2000; width: 85%; max-width: 320px; text-align: center;
        }
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); z-index: 1999; }
        
        #deadlineInput {
            text-align: center; font-size: 28px; font-weight: 700; margin: 15px 0;
            width: 100%; /* Verhindert das Hinausragen */
            max-width: 100%;
            display: block;
        }

        .wa-sticky-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(0deg, #f8fafc 40%, transparent 100%); display: flex; justify-content: center; z-index: 1000; }
        .wa-btn { background: var(--whatsapp); color: white; text-decoration: none; box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); max-width: 460px; width: 100%; }

        #clearBtn { position: fixed; bottom: 100px; right: 25px; background: white; border-radius: 50%; width: 50px; height: 50px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: none; font-size: 18px; cursor: pointer
